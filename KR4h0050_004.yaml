body:
  text: 妙絶古今卷四宋湯漢編歐陽子送徐無黨序本春秋傳立德立言立功之論草木鳥獸之為物衆人之為人其為生雖異而為死則同一歸於腐壞澌盡泯滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽愈遠而彌存也其所以為聖賢者修之於身施之於事見之於言是三者所以能不朽而存也修於身者無所不獲施於事者有得有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也孔子弟子有能政事者矣有能言語者矣若顔回者在陋巷曲肱饑卧而已其羣居則默然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千歲亦未有能及之者其不朽而存者固不待施於事况於言乎豫讀班固藝文志唐四庫書目見其所列自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉豫竊悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃也蓋如此今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字間者皆可悲也東陽徐生少從豫學為文章稍稍見稱於人既去而與羣士試於禮部得高第由是知名其文辭日進如水涌而山出豫欲摧其盛氣而勉其思也故於其歸告以是言然豫固亦喜為文辭者亦因以自警焉蘇子美文集序豫友蘇子美之亡後四年始得其平生文章遺藁於太子太傳杜公之家而集録之以為十卷子美杜氏壻也遂以其集歸之而告於公曰斯文金玉也弃擲埋沒糞土不能銷蝕其見遺於一時必皆收而寶之於後世者雖其埋沒而未出其精氣光怪已能常自發見而物不能掩也故方其擯斥摧挫流離窮厄之時文章已自行於天下雖其怨家仇人及嘗能出力而擠之死者至其文章則不能少毁而掩蔽之也凡人之情忽近而貴遠子美屈於今世猶若此其伸於後世宜如何也公其可無恨豫嘗考前世文章政理之盛衰而怪唐太宗致治幾乎三王之盛而文章不能革五代之餘習後百有餘年韓李之徒出然後元和之文始復於古唐衰兵亂又百餘年而聖宋興天下一定晏然無事又幾百年而古文始盛於今自古治時少而亂時多幸時治矣文章或不能純粹或遲久而不相及何其難之若是耶豈非難得其人歟苟一有其人又幸而及出於治世世其可不為之貴重而愛惜之歟嗟吾子美以一酒食之過至廢為民而流落以死此其可以嘆息流涕而為當世仁人君子之職位宜與邦家樂育人材者惜也子美之齒少於豫而豫學古文反在其後天聖之間豫舉進士於有司當時學者務以言語聲偶擲裂號為時文以相誇尚而子美獨與其兄才翁及穆參軍伯長作為古歌詩雜文時人頗共非笑之而子美不顧也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趨於古焉獨子美為於舉世所不為之時其始終自守不牽世俗趨舍可謂特立之士也子美官至大理評事集賢校理而廢後為湖州長史以卒享年四十有一其狀貌竒偉望之昻然而即之溫溫久而愈可愛慕其材雖高而人亦不甚嫉忌其擊而去之者意不在子美也賴天子聰明仁聖凡當時所指名而排斥二三大臣而下欲以子美為根而纍之者皆䝉保全今並列於榮寵雖與子美同時飲酒得罪之人多一時之英豪亦被收采進顯於朝廷而子美獨不幸死矣豈非其命也悲夫答吳充秀才書前辱示書及文三篇發而讀之浩浩乎若千萬言之多及少定而視焉才數百言爾非夫辭豐意雄霈然有不可禦之勢何以至此然猶自患倀倀然莫有開之使前者此好學之謙言也修才不足用於時仕不足榮於世其毁譽不足輕重氣力不足動人世之欲假譽以為重借力而後進者奚取於修焉先輩學精文雄其施於時又非待修譽而為重力而後進者也然而惠然見臨若有所貴得非急於謀道不擇其人而問焉者歟夫學者未始不為道而至者鮮焉非道之於人逺也學者有所溺焉耳蓋文之為言難工而可喜易悅而自足世之學者往往溺之一有工焉則曰吾學足矣甚者至棄百事不關於心曰吾文士也職於文而已此其所以至之鮮也昔孔子老而歸魯六經之作數年之頃耳然讀易者如無春秋讀書者如無詩何其用力少而至於至也聖人之文雖不可及然大抵道勝者文不難而自至也故孟子皇皇不暇著書苟卿蓋亦晚而有作若子雲仲淹方勉焉以模言語此道未足而强言者也後之惑者徒見前世之文傳以為學者文而已故愈力愈勤而愈不至此足下所謂終日不出於軒序不能縱橫髙下皆如意者道未足也若道之充焉雖行乎天地入於淵泉無不之也先輩之文浩乎霈然可謂善矣而又志於為道猶自以為未廣若不止焉孟荀可至而不難也修學道而不至者然幸不甘於所僥而溺於所止因吾子之能不自止又以勵修之少進焉豐樂亭記公與聖俞書云去年夏因飲滁水甚井問之云云近時有讀書者評此記云始飲未詳蓋未見此書耳修既治滁之明年夏始飲滁水而井問諸滁人得於州南百步之近其上則豐山聳然而特立下則幽谷窈然而深藏中有清泉滃然而仰出俯仰左右顧而樂之於是疏泉鑿石闢地以為亭而與滁人往遊其間滁於五代干戈之際用武之地也昔太祖皇帝嘗以周師破李景兵十五萬於清流山下生擒其將皇甫暉姚鳯於滁東門之外遂以平滁修嘗考其山川按其圖記升髙以望清流之關欲求暉鳯就擒之所而故老皆無在者蓋天下之平久矣自唐失其政海內分裂豪傑並起而爭所在為敵國何可勝數及宋受命聖人出而四海一向之慿恃險阻剗削消磨百年之間漠然徒見山髙而水清欲問其事則遺老盡矣今滁介於江淮之間舟車商賈四方賔客之所不至民生不見外事而安於畎畝衣食以樂生送死而孰知上之功德休養生息涵煦百年之深也修之來此樂其地僻而事簡又愛其俗之安間既得斯泉於山谷之間乃日與滁人仰而望山俯而聽泉掇幽芳而蔭喬木風霜氷雪刻露清秀四時之景無不可愛又幸其民樂其歲物之豐成而喜與豫游也因為本其山川道其風俗之美使民知所以安此豐年之樂者幸生無事之時也夫宣上恩德以與民共樂刺史之事也遂書以名其亭焉瀧岡阡表嗚呼惟我皇考崇公卜吉於瀧岡之六十年其子修始克表於其阡非敢緩也蓋有待也修不幸生四歲而孤太夫人守節自誓居貧自力於衣食以長以教俾至於成人太夫人告之曰汝父為吏亷而好施與喜賔客其俸祿雖薄常不使有餘曰母以是為我纍也故其亡也無一瓦之覆一壠之植以庇而為生吾何恃而能自守邪吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而幼吾不能知汝之必有立然知汝父之必將有後也吾之始歸也汝父免於母喪方逾年歲時祭祀則必涕泣曰祭而豐不如養之薄也間御酒食則又涕泣曰昔常不足而今有餘其何及也始吾一二見之以為新免於喪適然耳既而其後常然至其終身未嘗不然吾雖不及事姑而以此知汝父之能養也汝父為吏常夜燭治官書屢廢而嘆吾問之則曰此死獄也我求其生不得耳吾曰生可求乎曰求其生而不得則死者與我皆無恨也矧求而有得者邪以其求而得則知不求而死者有恨也夫常求其生猶失之死而世常求其死也回顧乳者劔汝而立於旁因指而嘆曰術者謂我歲行在戌將死使其言然吾不及見兒之立也後當以我語告之其平居教他子弟常用此語吾耳熟焉故能詳也其施於外事吾不能知其居於家無所矜飾而所為如此是直發於中者也嗚呼其心厚於仁者邪此吾知汝父之必將有後也汝其勉之夫養不必豐要於孝利雖不得慱於物要其心之厚於仁吾不能教汝此汝父之志也修泣而志之不敢忘先公少孤力學咸平三年進士及第為道州判官泗綿二州推官又為秦州判官享年五十有九葬沙溪之瀧岡太夫人姓鄭氏考諱德儀世為江南名族太夫人恭儉仁愛而有禮初封福昌縣太君進封樂安安康彭城三郡太君自其家少微時治其家以儉約其後常不使過之曰吾兒不能苟合於世儉薄所以居患難也其後修貶夷陵太夫人言笑自若曰吾處之有素矣汝能安之吾亦安矣自先公亡二十年修始得祿而養又十有二年列官于朝始得贈封其親又十年修為龍圖閣直學士尚書吏部郎中留守南京太夫人以疾終於官舍享年七十有二又八年修以非才入副樞密遂參政事又七年而罷自登二府天子推恩褒其三世故自嘉祐以來逢國大慶必加寵錫皇曽祖府君纍贈金紫光祿大夫太師中書令曽祖妣纍贈楚國太夫人皇祖府君纍贈金紫光祿大夫太師中書令兼尚書令祖妣纍封吳國太夫人皇考崇公纍贈金紫光祿大夫太師中書令兼尚書令皇妣纍封越國夫人今上初郊皇考賜爵為崇國公太夫人進號魏國於是小子修泣而言曰嗚呼為善無不報而遲速有時此理之常也惟我祖考積善成德宜享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇賴其子孫矣乃列其世譜具刻于碑既又載我皇考崇公之遺訓太夫人之所以教而有待於修者並揭於阡俾知夫小子修之德薄能鮮遭時竊位而幸全大節不辱其先者其來有自唐史高祖紀贊自古受命之君非有德不王自夏后氏以來始傳以世而有賢有不肖故其為世數亦或短或長論者乃謂周自后稷至於文武積功纍仁其來也遠故其為世尤長然考於世本夏商周皆出於黃帝夏自鯀以前商自契至於成湯其間寂寥無聞與周之興異矣而漢亦起於亭長叛亡之徒及其興也有天下皆數百年而後已由是言之天命豈易知哉考其終始治亂顧其功德有厚薄與其制度紀綱所以維持者如何而其後世或寖以隆昌或遽以壞亂或漸以陵遲或能振而復起或遂至於不可支持雖各因其勢然有德則興無德則絶豈非所謂天命者雖不顯其符而俾有國者兢兢以自勉耶唐在周隋之際世雖貴矣然烏有所謂積功纍仁之漸而高祖之興亦何異因時而特起者歟雖其有治有亂或絶或微然其有天下年幾三百可謂盛哉豈非人厭隋亂而䝉唐德澤繼以太宗之治制度紀綱之法後世有以慿藉扶持而能永其天命者歟五代史王進傳贊嗚呼豫述舊史至於王進之事未嘗不廢書而嘆曰甚哉五代之君皆武人崛起其所與俱勇夫悍卒各裂土地封侯王何異豺狼之牧斯人也雖其附託遭遇出於一時之幸然猶必皆橫身陳敵非有百夫之勇則必一日之勞至於進者徒以疾足善走而秉麾節何其甚歟豈非名器之用隨世而輕重者歟世治則君子居之而重世亂則小人易得而輕歟抑因緣僥幸未始不有而尤多於亂世既其極也遂至於是歟豈其又有甚於是者歟當此之時為國家者不過十餘年短者三四年至一二年天下之人視其上易君代國如更戌長無異蓋其輕如此况其下者乎如進等者豈足道哉易否泰消長君子小人常相上下視在上者如進等則其在下者可知矣豫書進事所以哀斯人之亂而見當時賢人君子之在下者可勝道哉可勝道哉曽南豐新序目録序古之治天下者一道德同風俗蓋九州之廣萬民之衆千歲之逺其教已明其習已成之後所守者一道所傳者一說而已故詩書之文厯世數十作者非一而其言未嘗不相為終始化之如此其至也當是之時異行者有誅異言者有禁防之又如此其備也故二帝三王之際及其中間嘗更衰亂而餘澤未熄之時百家衆說未有能出於其間者也及周之末世先王之教化法度既廢餘澤既熄世之治方術者各得其一偏故人奮其私智家尚其私學者蜂起於中國皆明其所長而昧其所短矜其所得而諱其所失天下之士各自為方而不能相通世之人不復知夫學之有統道之有歸也先王之遺文雖在皆輟而不講况至於秦為世之所大禁哉漢興六藝皆得於散絶殘脫之餘世復無明先王之道以一之者諸儒苟見傳記百家之言皆恱而嚮之故先王之道為衆說之所蔽暗而不明鬱而不發而怪竒可喜之論各師異見皆自名家者誕謾於中國一切不異於周之末世其弊至於今尚在也自斯以來天下學者知折𠂻於聖人而能純於道德之美者揚雄氏而止耳如向之徒皆不免乎為衆說之蔽而不知有所折𠂻者也孟子曰待文王而後興者凡民也豪傑之士雖無文王猶興漢之士豈特無明先王之道以一之者哉亦其出於是時者豪傑之士少故不能特起於流俗之中絶學之後也蓋向之序此書於今最為近古雖不能無失然遠至舜禹而次及於周秦以來古人之嘉言善行亦往往而在也要在慎取之而已故臣既惜其不可見者而校其可見者特詳焉亦足以知臣之攻其失者豈好辨哉臣之所不得已也南齊書目録序將以是非得失興壞理亂之故而為法戒則必得其所託而後能傳於久此史之所以作也然而所託不得其人則失其意或亂其實或析理之不通或設辭之不善故雖有殊功偉德非常之迹將暗而不章鬱而不發而檮杌嵬瑣姦回凶惡之形可幸而掩也嘗試論之古之所謂良史者其明必足以周萬事之理其道必足以適天下之用其智必足以通難知之意其文必足以發難顯之情然後其任可得而稱也何以知其然邪昔者唐虞有神明之聖微妙之德使由之者不能知知之者不能名以為治天下之本號令之所布法度之所設其言至約其體至備以為治天下之具而為至典者推而明之所記者豈獨其迹耶并與其深微之意而傳之小大粗精無不盡也本末先後無不白也使誦其說者如出乎其時求其指者如即乎其人是可不謂明足以周萬事之理道足以適天下之用智足以通難知之意文足以發難顯之情者乎則方是之時豈特任政者天下之士哉蓋執簡操筆而隨者亦皆聖人之徒也兩漢以來為史者去之遠矣司馬遷從五帝三王既沒數千載之後秦火之餘因散絶殘脫之經以及傳記百家之說區區掇拾以集著其善惡之迹興廢之端又創已意以為本紀世家八書列傳之文斯亦可謂竒矣然而蔽害天下之聖法是非顛倒而采托繆亂者亦豈少哉夫自三代以後為史者如遷之文亦不可不謂雋偉拔出之材非常之士也然顧不足以發難顯之情者蓋聖賢之髙致遷固有不能達其情而見之於後者矣遷之得失如此况其他邪至於宋齊梁陳後魏後周之書蓋無以議為也子顯之於斯文喜自馳騁其更改破析刻雕藻繢之變尤多而其文益下豈夫才固不可以彊而有邪數世之史既然故其辭迹曖昧雖有隨世以就功名之君相與合謀之臣未有赫然得傾動天下之耳目播天下之口者也而一時偷奪傾危悖理反義之人亦幸而不暴著於世豈非所托不得其人故耶可不惜哉雲峰院記西山云序事如太史公分寧人勤生而嗇施薄義而喜爭其土俗然也自府來抵其縣五百里在山谷窮處其人修農桑之務率數口之家留一人守舍行饁其外盡田田高下磽腴隨所宜雜植五穀無廢壤女婦蠶杼無懈人茶鹽蜜紙竹箭材葦之貨無有纎巨治咸盡其力其勤如此富兼田千畝廩實藏錢至纍歲不發然視捐一錢可以易死寧死無所捐其於施何如也其間利害不能以稊米父子兄弟夫婦相去若奕碁然於其親固然於義厚薄可知也長少族坐里閭相講語以法律意嚮小戾則相告訐結黨詐張事關節以動視聽甚者畫刻金木為章印摹文書以紿吏立縣庭下變僞一日千出雖笞撲徙死交迹不以屬心其喜爭訟豈比他州縣哉民雖勤而習如是漸涵入骨髓故賢令長佐吏比肩常病其未易治教使移也雲峰院在縣極西界無籍圖不知自何時立景德三年邑僧道常治其院而侈之門闥靚深殿寢言言棲客之廬齊庖庫庾序列兩旁浮圖所用鐃鼓魚螺鍾磬之編百器備完吾聞道常氣質偉然雖索其學其歸未能當於義然治生事不廢其勤亦稱其土俗至有餘則斤散之不為黍纍計惜樂淡泊無纍則又若勝其嗇施喜爭之心可言也或曰使其人不汨溺其所學其歸一當於義則傑視邑人者必道常乎未敢必也慶厯三年九月與其徒謀曰吾排蓬藋治是院不自意成就如此今老矣恐泯泯無聲畀來人相與圖文字買石刻之使永永與是院俱傳可不可也咸曰然推其徒了思來請記遂來豫不讓為申其可言者寵嘉之使刻示邑人其有激也徐孺子祠堂記漢元興以後政出宦者小人挾其威福相煽為惡中材顧望不知所為漢既失其操柄紀綱大壞然在位公卿大夫多豪傑特起之士相與發憤同心直道正言分别是非黑白不少屈其意至於不容而織羅鉤黨之獄起其執彌堅而其行彌厲志雖不就而忠有餘故及其既沒而漢亦以亡當是之時天下聞其風慕其義者人人感慨奮激至於解印綬棄家族骨肉相勉趨死而不避百餘年間擅彊大覬非望者相屬皆逡巡而不敢發漢能以亡為存蓋其力也孺子於時豫章太守陳蕃太尉黃瓊辟皆不就舉有道拜太原太守安車備禮召皆不至蓋忘己以為人與獨善於隱約其操雖殊其忠於人一也在位士大夫抗其節於亂世不以死生動其心異於懷祿之臣遠矣然而不屑去者義在於濟物故也孺子嘗謂郭林宗曰大木將顛非一繩所維何為栖栖不皇寧處此其意亦非自足於丘壑遺世而不顧者也孔子稱顔回用之則行舍之則藏惟我與爾有是夫孟子亦稱孔子可以進則進可以止則止乃所願則學孔子而易於君子小人消長進退擇所宜處未嘗不惟其時則見其不可而止此孺子所以未能以此而易彼也孺子姓徐名稚孺子其字也豫章南昌人按圖記章水北經南昌城西厯白社其西有孺子墓又北厯南塘其東為東湖湖南小洲上有孺子宅號孺子臺吳嘉禾中太守徐熙於孺子墓隧種松太守謝景於墓側立碑晉永安中太守夏侯嵩於碑旁立思賢亭世世修治至拓跋魏時謂之聘君亭今亭尚存而湖南小洲世不知其嘗為孺子宅又嘗為臺也余為太守之明年始即其處結茅為堂圖孺子像祠以中牢率州之賔屬拜焉漢至今且千歲富貴堙滅者不可稱數孺子不出閭巷獨稱思至今則世之欲以智力取勝者非惑歟孺子墓失其地而臺可考而知祠之所以視邦人以尚德故并采其出處之意為記焉王荆公潭州新學詩治平元年天章閣待制興國吳公治潭之明年正月改築廟學於城東南越五月告成孔子用幣潭人曰公為善政以德我又不勩我而為此學以嘉我士子誰能詩乎以誦我公於無窮皆辭不敢乃使來請詩曰有嘉新學潭守所作守者誰歟仲庶氏吳振養矜寡衣之褰襦黔首鼓歌吏靜不求乃相廟序生師所廬上漏旁穿燥濕不除曰嘻遷哉迫厄卑汚當其壞時適可以謀營地慮工伐楩楠櫧徹故就新為此渠渠潭人來止相語而喜我知視成無豫經始公升在堂從者如水公曰誨汝潭之士子古之讀書凡以為已躬行孝弟由義而仕神聽汝助况於閭里無實而夸非聖自是雖大得意吾猶汝耻士下其手公言無尤請歌我詩以遠公休書洪範傳後王安石曰古之學者雖問以口而其傳以心雖聽以耳而其受者意故為師者不煩而學者有得也孔子曰不憤不啓不悱不發舉一隅不以三隅反則不復也夫孔子豈敢愛其道驚天下之學者而不使其早有知乎以謂其問之不切則其聽之不専其思之不深則其取之不固不専不固而可以入者口耳而已矣吾所以教者非將善其口耳也孔子沒道日以衰熄浸淫至於漢而傳注之家作為師則有講而不應為弟子則有讀而無問非不欲問也以經之意為盡於此矣吾可以無問而得也豈特無問又將無思非不欲思也以經之意為盡於此矣吾可以無思而得也夫如此使其傳注者皆已善矣固足以善學者之口耳而不足以善其心况其有不善乎宜其厯年以千數而聖人之經卒於不明而學者莫能資其言以施於世也豫悲夫洪範者武王之所以虛心而問與箕子之所以悉意而言為傳注者汨之以至於今冥冥也於是為作傳以通其意嗚呼學者不知古之所以教而蔽於傳注之學也久矣當其時欲其思之深問之切而後復焉則吾將孰待而言邪孔子曰豫欲無言然未嘗無言也蓋有不得已焉孟子則天下固以為好辨蓋邪說暴行作而孔子之道幾於熄焉孟子者不如是不足與有明也故孟子曰豫豈好辨哉豫不得已也夫豫豈樂反古之所以教而重為此譊譊哉其亦不得已焉者也蘇老泉族譜引有藏此文真蹟者注引云榖梁體詩云脊令詩蘇氏族譜譜蘇氏之族也蘇氏出於高陽而蔓延於天下唐神堯初長史味道刺眉州卒於官一子留於眉眉之有蘇氏自此始而譜不及者親盡也親盡則曷為不及譜為親作也凡子得書而孫不得書者何也以著代也自吾之父以至吾之髙祖仕不仕娶某氏享年幾某日卒皆書而他不書者何也詳吾之所自出也自吾之父以至吾之高祖皆曰諱某而他則遂名之何也尊吾之所自出也譜為蘇氏作而獨吾之所自出得詳與尊何也譜吾作也嗚呼觀吾之譜者孝悌之心可以油然而生矣情見於親親見於服服始於衰而至於緦麻而至於無服無服則親盡親盡則情盡情盡則喜不慶憂不弔喜不慶憂不弔則塗人也吾所與相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至於塗人吾譜之所以作也其意曰分至於塗人者勢也勢吾無如之何也幸其未至於塗人也使其無至於忽忘焉可也嗚呼觀吾之譜者孝悌之心可以油然而生焉矣系之以詩曰吾父之子今為吾兄吾疾在身兄呻不寧數世之後不知何人彼死而生不為戚欣兄弟之情如足於手其能幾何彼不相能彼獨何心仲兄文甫字說洵讀易至渙之六四曰渙其羣元吉曰嗟夫羣者聖人之所欲渙以混一天下者也蓋豫仲兄名渙而字公羣則是以聖人之所欲解散滌蕩者以自命也而可乎他日以告兄曰子可無為我易之洵曰唯既而曰請以文甫易之如何且兄嘗見夫水之與風乎油然而行淵然而留渟洄汪洋滿而上浮者是水也而風實起之蓬蓬然而發乎大空不終日而行乎四方蕩乎其無形飄乎其逺來既往而不知其迹之所存者是風也而水實形之今夫風水之相遭乎大澤之陂也紆餘委蛇蜿蜒淪漣安而相推怒而相凌舒而如雲蹙而如鱗疾而如馳徐而如徊揖遜旋辟相顧而不前其繁如縠其亂如霧紛紜鬱擾百里若一汨乎順流至乎滄海之濵磅礴洶涌號怒相軋交橫綢繆放乎空虛掉乎無垠橫流逆折濆旋傾側宛轉膠戾回者如輪縈者如帶直者如燧奔者如焰跳者如鷺躍者如鯉殊狀異態而風水之極觀備矣故曰風行水上渙此亦天下之至文也然而此二物者豈有求乎文哉無意乎相求不期而相遭而文生焉是其為文也非水之文也非風之文也二物者非能為文而不能不為文也物之相使而文出於其間也故曰此天下之至文也今夫玉非不溫然美矣而不得以為文刻鏤組繡非不文矣而不可以論乎自然故夫天下之無營而文生之者惟水與風而已昔者君子之處於世不求有功不得己而功成則天下以為賢不求有言不得己而言出則天下以為口實嗚呼此不可與他人道之惟吾兄可也送吳侯職方赴闕引因天地萬物有可以如此之勢而寓之於事則其始不强而易成其成也窮萬物而不可變聖人見天地之間以物加物而不能皆長不能皆短於是有度見一人之手不能盛江河之沙礫而太山之谷納一石而不加淺於是有量見物橫於空中首重而末舉於是有權衡長短之相形大小之相盛輕重之相抑昻皆物之所自有而度量權衡者因焉故度量權衡家有之而不可闕至於後世有作者出以為因物之自然以成物不足以見吾智於是作器使之不擊而自鳴不觸而自轉虛而欹水實其中而覆半而端如常器嗚呼殆矣吾見其朝作而暮廢也夫不忍而謂之仁忍而謂之義見蹈水者不忍而拯其手而仁存焉見井中之人度不能出忍而不從而義有焉無傷其身而活一人人心有之不肯殺其身以濟必不能生之人人心有之有人焉以為人心之所自有而不足以驚人也乃曰殺吾身雖不能生人吾為之此人心之所自有邪强之也强不能以及逺使人之心不忍殺人而亦不以無故殺其身是亦足以為仁矣乎嗚呼有餘矣誰能不忍視人之死而亦不肯妄殺其身者然則異世驚衆之行亦無有以加之也吳侯職方有名於當時其胸中泊然無崖岸限隔又無趨然躍然務出竒怪之操以震撼世俗之志是誠使刻厲險薄之人見之將不識其所以與常人異者然使之退而思其平生大方則淳淳渾渾不可遽測此所謂能充其心之所自有而天下之君子也吳侯有名於世三十年而猶於此為逺官今其東歸其不碌碌為此官矣哉蘇東坡六一居士集序夫言有大而非誇達者信之衆人疑焉孔子曰天之將喪斯文也後死者不得與於斯文也孟子曰禹抑洪水孔子作春秋而豫距楊墨蓋以是配禹也文章之得喪何與於天而禹之功與天地並孔子孟子以空言配之不已誇乎自春秋作而亂臣賊子懼孟子之言行而楊墨之道廢天下以為是固然而不知其功孟子既沒有申商韓非之學違道而趨利殘民以厚主其說至陋也而士以是罔其上上之人僥幸一切之功靡然從之而世無大人先生如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者蓋十八九天下蕭然洪水之患蓋不至此也方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不至若是烈也使楊墨得志於天下其禍豈减於申韓哉由此言之雖以孟子配禹可也太史公曰蓋公言黃老賈誼朝錯明申韓錯不足道也而誼亦為之余以是知邪說之移人雖豪傑之士有不免者况餘人乎自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子蓋庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世之不說者譁而攻之能折困其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為高以救時行道為賢以犯顔敢諌為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之歐陽子沒十有餘年士始為新學以佛老子似亂周孔之實識者憂之賴天子明聖詔修取士法風厲學者専治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書豫得其詩文七百六十六篇於其子棐乃次而論之曰歐陽子論大道似韓愈論事似陸贄記事似司馬遷詩賦似李白此非豫言也天下之言也歐陽子諱修字永叔既老自謂六一居士云范文正公集序慶厯三年軾始總角入鄉校士有自京師來者以魯人石守道所作慶厯聖德詩示鄉先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何為其不可先生竒軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則已私識之矣嘉祐二年始舉進士至京師則范公沒既葬而墓碑出讀之至流涕曰吾得其為人蓋十有五年而不一見其面豈非命歟是歲登第始見知于歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相堯夫又六年始見其叔彛叟京師又十一年遂與其季德儒同僚於徐皆一見如舊且以公遺藁見屬為序又十三年乃克為之嗚呼公之功德蓋不待文而顯其文亦不待序而傳然不敢辭者自以八歲知敬愛公今四十七年矣彼三傑者皆得從之游而公獨不識以為平生之恨若獲掛名其文字中以自托於門下士之末豈非疇昔之願也哉古之君子如伊尹太公管仲樂毅之徒其王霸之略皆定於畎畝中非仕而後學者也淮陰侯見高帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主論曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳受嘗試為之而僥幸其或成者哉公在天聖中居太夫人憂則已有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將擢為執政考其平生所為無出此書者今其集二十卷為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝悌蓋如饑渴之於飲食欲須臾忘而不可得如火之熱如水之濕蓋其天性有不得不然者雖弄翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非有言也德之發於口者也又曰我戰則克祭則受福非能戰也德之見於怒者也斷句似文甫字說樂全先生文集序孔北海志大而論高功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊尹說命相表裏非秦漢以來以事君為悅者所能至也常恨二人之文不見其全今吾樂全先生張公安道其庶幾乎嗚呼士不以天下之重自任久矣言語非不工也政事文章非不敏且博也然至於臨大事鮮不忘其故失其守者其器小也公為布衣則頎然已有公輔之望自少出仕至老而歸未嘗以言徇物以色假人雖對人主必同而後言毁譽不動得喪若一真孔子所謂大臣以道事君者世遠道散雖志士仁人或少貶以求用公獨以邁往之氣行正大之言曰用之則行舍之則藏上不求合於人主故雖貴而不用用而不盡下不求合于士大夫故悅公者寡不悅公者衆然至言天下偉人則必以公為首公盡性知命體乎自然而行乎不得已非蘄以文字名世者也然自慶厯以來訖元豐四十餘年所與人主論天下事見於章疏者多矣或用或不用而皆本於禮義合於人情是非有考於前而成敗有驗於後及其他詩文皆清遠雄麗讀者可以想見其為人信乎其為有似於孔北海諸葛孔明也軾年二十以諸生見公成都公一見待以國士今三十餘年所以開發成就之者至矣而軾終無所效尺寸於公者獨求其文集手校而家藏之且論其大略以待後世之君子昔曽魯公嘗為軾言公在人主前論大事他人終日反覆不能盡者公必數言而决粲然成文皆可書而誦也言雖不盡用慶厯以來名臣為人主所敬莫如公者公今年八十一杜門却掃終日危坐將與造物者遊於無何有之鄉言且不可得聞而况其文乎凡為文若干卷若干首思堂記定安章質夫築室於公堂之西名之曰思曰吾將朝夕於是凡吾之所為必思而後行子為我記之嗟夫余天下之無思慮者也遇事則發不暇思也未發而思之則未至已發而思之則無及以此終身不知所思言發於心而衝於口吐之則逆人茹之則逆余以為寧逆人也故卒吐之君子之於善也如好好色其於不善也如惡惡臭豈復臨事而後思計議其美惡而避就之哉是故臨義而思利則義必不果臨戰而思生則戰必不力若夫窮達得喪死生禍福則吾有命矣少時遇隱者曰孺子近道少思寡欲曰思與欲若是均乎曰甚於欲庭有二盎以畜水隱者指之曰是有蟻漏是日取一升而棄之孰先竭曰必蟻漏者思慮之賊人也微而無間隱者之言有㑹於余心余行之且夫不思之樂不可名也虛而明一而通安而不懈不處而靜不飲酒而醉不閉目而睡將以是記思堂不亦繆乎雖然言各有當也萬物並育而不相害道並行而不相悖以質夫之言其所謂思者豈世俗之營營於思慮者乎易曰無思也無為也我願學焉詩曰思無邪質夫以之元豐二年正月二十四日記韓文公廟碑匹夫而為百世師一言而為天下法是皆有以參天地之化關盛衰之運其生也有自來其逝也有所為矣故申吕自嶽降傅說為列星古今所傳不可誣也孟子曰我善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辨是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神明則復為人此理之常無足怪者自東漢以來道喪文敝異端並起厯唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正蓋三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地關盛衰浩然而獨存者乎蓋嘗論天人之辨以謂人無所不至惟天不容僞智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鏄李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上蓋公之所能者天也其所不能者人也始潮人未知學公命進士趙德為之師自是潮之士皆篤於文行延及齊民至於今號稱易治信乎孔子之言君子學道則愛人小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入維艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既悅服則出令曰願新公廟者聽民歡趍之卜地於州城之南七里期年而廟成或曰公去國萬里而謫於潮不能一歲而歸沒而有知其不眷戀于潮也審矣軾曰不然公之神在天下者如水之在地中無所往而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水専在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事于石因作詩以遺之使歌以祀公其詩曰公昔騎龍白雲鄉手抉雲漢分天章天孫為織雲錦裳飄然乘風來帝旁下與濁世掃粃糠西遊咸池略扶桑草木衣被昭回光追逐李杜參翺翔汗流籍湜走且僵滅沒倒景不可望作書詆佛譏君王要觀南海窺衡湘厯舜九疑弔英皇祝融先驅海若藏約束鮫鱷如驅羊鈞天無人帝悲傷謳吟下招遣巫陽犦牲雞卜羞我觴於粲荔丹與蕉黃公不少留我涕滂翩然被髮下大荒贊王元之畫像傳曰不有君子其能國乎豫嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立於朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣之徒雖纍千百緩急豈可望哉故翰林王公元之以雄文直道獨立當世足以追配此六君子者方是時朝廷清明無大姦慝然公猶不容於中耿耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而處於衆邪之間安危之際則公之所為必將驚世絶俗使斗筲穿窬之流心破膽裂豈特如此而已乎始余過蘇州虎丘寺見公之畫像想其遺風餘烈願為執鞭而不可得其後為徐州而公之曽孫汾為兗州以公墓碑示豫乃追為之贊以附其家傳云維昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山之死靡憾咸平以來獨為名臣一時之屈萬世之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能已之茫茫九原愛莫起之絶妙古今卷四
