body:
  text: 妙絶古今巻二宋湯漢編國䇿莊辛謂楚襄王曰君王左州侯右夏侯輦從鄢陵君與夀陵君謂輦出則二人從之專淫逸侈靡不顧國政郢都必危矣襄王曰先生老悖乎將以為楚國妖祥乎莊卒曰臣誠見其必然者也非敢以為國妖祥也君王卒幸四子者不衰楚國必亡矣臣請避於趙淹留以觀之莊辛去之趙五月秦果舉鄢郢巫上蔡陳之地襄王流揜於城陽流謂走揜覆也謂自匿於是使人發騶徵莊辛於趙莊辛曰諾莊辛至襄王曰寡人不能用先生之言今事至於此為之奈何莊辛對曰臣聞鄙語曰見兎而顧犬未為晚也亡羊而補牢未為遲也臣聞昔湯武以百里昌桀紂以天下亾今楚國雖小絶長續短猶以數千里豈特百里哉王獨不見夫蜻蛉乎六足四翼飛翔乎天地之間俛啄蚉䖟而食之仰承甘露而飲之自以為無患與人無爭也不知五尺童子方將調飴膠系加已乎四仭之上而下為螻蟻食也蜻蛉其小者也黄雀俯噣白粒仰棲茂樹鼓翅奮翼自以為無患與人無爭也不知公子王孫左挾彈右攝丸將加已乎十仞之上以其類為招晝㳺乎茂樹夕調乎酸醎倐忽之間隊於公子之手矣黄雀其小者也黄鵠遊於江海淹乎大沼俯噣䱧鯉仰嚙䔖衡奮其六翮而凌清風飄揺乎高翔自以為無患與人無爭也不知夫射者方將修其碆盧治其繒繳將加已乎百仞之上引纎繳揚㣲波折清風而殞矣故晝遊乎江河夕調乎鼎鼐夫黄鵠其小者也蔡靈侯之事因是以新序作故是也南遊乎高陂北陵乎巫山飲茹溪之流續後語飲茹溪之蔬注云茹溪巫山之溪食湘陂之魚左抱幼妾右擁嬖女與之馳騁乎高蔡之中而不以國家為事不知夫子發方受命乎靈王繫已以朱絲而見之也楚子誘靈侯殺之于申蔡靈侯之事其小者也君王之事因是以左州侯右夏侯輦從鄢陵君與夀陵君飯封禄之粟而載方府之金與之馳騁乎雲夢之中而不以天下國家為事不知夫穰侯方受命乎秦王填黽塞之内而投已乎黽塞之外填兵滿也江夏有鄳即魏䇿鄳隘之塞襄王聞之顔色變作身體戰慄於是乃以執珪而授之為陽陵君而用計焉與舉淮北之地十二諸侯以新序參鮑彪云此䇿天下之善規也襄王雖失之東隅而收之桑榆故其季年保境善鄰差為無事此䇿為有力焉李漢老有記文放此體史記夫學者載籍極博猶考信於六藝詩書雖缺然虞夏之文可知也堯將遜位讓於虞舜舜禹之間岳牧咸薦乃試之於位典職數十年功用既興然後授政示天下重器王者大統傳天下若斯之難也而說者曰堯讓天下於許由許由不受恥之逃隠及夏之時有卞隨務光者此何以稱焉太史公曰余登箕山其上蓋有許由冢云孔子序列古之仁聖賢人如呉太伯伯夷之倫詳矣余以所聞由光義至高其文辭不少概見何哉孔子曰伯夷叔齊不念舊惡怨是用希求仁得仁又何怨乎余悲伯夷之意睹軼詩可異焉其傳曰伯夷叔齊孤竹君之二子也父欲立叔齊及父卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而逃之國人立其中子於是伯夷叔齊聞西伯昌善養老盍往歸焉及至西伯卒武王載木主號為文王東伐紂伯夷叔齊叩馬而諫曰父死不葬爰及干戈可謂孝乎以臣弑君可謂仁乎左右欲兵之太公曰此義人也扶而去之武王已平殷亂天下宗周而伯夷叔齊恥之義不食周粟隠於首陽山采薇而食之及餓且死作歌其辭曰登彼西山兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉没兮我安適歸矣于嗟徂兮命之衰矣遂餓死於首陽山由此觀之怨邪非邪或曰天道無親常與善人若伯夷叔齊可謂善人者非邪積仁潔行如此而餓死且七十子之徒仲尼獨薦顔淵為好學然回也屢空糟糠不厭而卒蚤夭天之報施善人其何如哉盗跖日殺不辜肝人之肉暴戾恣睢聚黨數千人横行天下竟以夀終是遵何徳哉此其尤大彰明較著者也若至近世操行不軌專犯忌諱而終身逸樂富厚累世不絶或擇地而蹈之時然後出言行不由逕非公正不發憤而遇禍灾者不可勝數也余甚惑焉儻所謂天道是邪非邪子曰道不同不相為謀亦各從其志也故曰富貴如可求雖執鞭之士吾亦為之如不可求從吾所好歳寒然後知松栢之後彫舉世混濁清士乃見豈以其重若彼其輕若此哉君子疾没世而名不稱焉賈子曰貪夫徇財烈士徇名夸者死權衆庶馮生同明相照同類相求雲從龍風從虎聖人作而萬物覩伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而行益顯巖穴之士趨舍有時若此類名堙滅而不稱悲夫閭巷之人欲砥行立名者非附青雲之士惡能施於後世哉朱文公嘗曰孔子言伯夷求仁得仁又何怨據史遷一傳却是伯夷滿腹皆怨矣又云伯夷當時何曾指擬仲尼來發揮他耶太史遠遊先生又嘗論之曰學者載籍極博猶考信於六藝言衆言殽亂惟折𠂻於聖人也詩書雖闕然虞夏之文可知堯舜禹之相授傳天下若斯之難而說者乃有許由務光等事此何以稱焉疑之也余登箕山乃有許由冢則信然矣孔子序列古之仁聖賢人如太伯伯夷詳矣由光義至高而文辭不少概見此太史所為深惜之也蓋其馳騁上下數千載欲求一節義最高者嚴立於其首有譲國之高節如由光而不見述於聖人是以無傳此伯夷傳之所以作也孔子言伯夷叔齊怨是用希求仁得仁又何怨余悲其意睹軼詩可異焉觀采薇之詩則疑於怨矣叙其事述其歌申之曰怨耶非耶其末雜引經傳之文而卒歸之伯夷叔齊雖賢得夫子而名益彰顔淵雖篤學附驥尾而行益顯閭巷之人欲砥行立名非附青雲之士惡能施於後世又所以深悲由光之無傳而喜伯夷之遇夫子也要其歸則不出最初兩語載籍極博考信六藝而已孰謂子長愛竒哉屈原者名平楚之同姓也為楚懐王左徒博聞彊志明於治亂嫺於辭令入則與王圖議國事以出號令出則接遇賓客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能懐王使屈原造為憲令屈平屬草藁而未定上官大夫見而欲奪之屈平不與因讒之曰王使屈平為令衆莫不知每一令出平伐其功曰以為非我莫能為也王怒而䟽屈平屈平疾王聽之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷離騷者猶離憂也夫天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也屈平正道直行竭忠盡智以事其君讒人間之可謂窮矣信而見疑忠而被謗能無怨乎屈平之作離騷蓋自怨生也國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣上稱帝嚳下道齊桓中述湯武以刺世事明道徳之廣崇治亂之條貫靡不畢見其文約其辭㣲其志㓗其行廉其稱文小而其指極大舉類邇而見義逺其志㓗故其稱物芳其行廉故死而不容自疎濯淖汙泥之中蟬蛻於濁穢以浮游塵埃之外不獲世之滋垢皭然泥音涅而不滓者也推此志也雖與日月爭光可也燕惠王悔使騎刼代樂毅以故破軍亡將失齊又怨樂毅之降趙恐趙用樂毅而乘燕之敝以伐燕燕惠王乃使人讓樂毅且謝之曰先王舉國而委將軍將軍為燕破齊報先王之讎天下莫不震動寡人豈敢一日而忘將軍之功哉㑹先王棄羣臣寡人新即位左右誤寡人寡人之使騎刼代將軍為將軍乆暴露於外故召將軍且休計事將軍過聽以與寡人有隙遂捐燕歸趙將軍自為訃則可矣而亦何以報先王之所以遇將軍之意乎樂毅報遺燕惠王書曰臣不佞不能奉承王命以順左右之心恐抵斧質之罪以傷先王之明有害足下之義故遁逃走趙今足下使人數之以罪臣恐侍御者不察先王之所以畜幸臣之理又不白臣之所以事先王之心故敢以書對臣聞賢聖之君不以禄私其親功多者授之不以官隨其愛能當者處之故察能而授官者成功之君也論行而結交者立名之士也臣竊觀先王之舉錯有高世之心故假節於魏以身得察於燕先王過舉擢之賔客之中立之羣臣之上不謀父兄以為亞卿臣竊不自知自以為奉命承教可幸無罪故受令而不辭先王命之曰我有積怨深怒於齊不量輕弱而欲以齊為事臣曰夫齊霸國之餘業而驟勝史作㝡勝之遺事也練於兵甲習於戰攻王若欲伐之必與天下圖之與天下圖之莫若結於趙且又淮北宋地楚魏之所欲也趙若許而約四國攻之齊可大破也先王以為然具符節南使臣於趙顧反命起兵擊齊以天之道先王之靈河北之地隨先王而舉之濟上濟上之軍受命擊齊大敗齊人輕卒銳兵長驅至國齊王遁而走莒僅以身免珠玉財寳車甲珍器盡收入于燕齊器設於寜臺燕臺大吕陳於元英大吕齊鐘元英燕殿故鼎反乎磨室燕鼎前輸於齊今復反國䇿作厯室薊丘之植植於汶篁竹田曰篁移燕薊丘所植植於汶篁自五伯以來功未有及先王者也先王以為慊嗛作慊於志故裂地而封之使得比小國諸侯臣竊不自知自以為奉命承教可幸無罪是以受命不辭臣聞賢聖之君功立而不廢故著於春秋蚤知之士名成而不毁故稱於後世若先王之報怨雪恥夷萬乘之強國收八百歳之蓄積及至弃羣臣之日餘教未衰執政任事之臣修法令愼庻孽施及乎萌𨽻皆可以教後世臣聞之善作者不必善成善始者不必善終昔伍子胥說聽於闔閭而呉王逺跡至郢夫差弗是也賜之䲭夷而浮之江呉王不寤先論之可以立功故沈子胥而不悔子胥不蚤見主之不同量是以至於入江而不化夫免身全功以明先王之迹臣之上計也離毁辱之非堕先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣恐侍御者之親左右之說不察疏逺之行故敢獻書以聞惟君王之留意焉以國䇿參楚人有好以弱弓㣲繳加歸鴈之上者頃襄王聞召而問之對曰小臣之好射鶀鴈羅鸗鸗野鳥也音龍鶀音其小鴈也小矢之發也何足為大王道也且稱楚之大因大王之賢所弋非直此也昔者三王以弋道徳五霸以弋戰國故秦魏燕趙者鶀鴈也齊魯韓衛者青首也小鳥有青首者鄒費郯邳者羅鸗也外其餘則不足射者見鳥六雙於王何取以喻下文秦趙等十二國故云六雙王何不以聖人為弓以勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬鴈之實也王朝張弓而射魏之大梁之南加其右臂而徑屬之於韓則中國之路絶而上蔡之郡壞矣還射圉之東解魏左肘而外擊定陶則魏之東外棄而大宋方與二郡者舉矣且魏斷二臂顛越矣膺擊郯國大梁可得而有也王綪繳蘭臺綪縈也音爭飲馬西河定魏大梁此一發之樂也若王之於弋誠好而不厭則出寳弓碆新繳以石傳弋繳曰碆碆音波射噣鳥於東海還蓋長城以為防噣音畫謂大鳥之有鉤喙者以比齊也蓋者覆也言射者環遶蓋覆使無飛走之路因以長城為防也朝射東莒夕發沮丘夜加即墨顧據午道則長城之東收而太山之北舉矣西結境於趙而北達於燕三國布􅢄音翅三國齊趙燕也則從不待約而可成也北遊目於燕之遼東而南登望於越之㑹稽此再發之樂也若夫泗上十二諸侯左縈而右拂之可一旦而盡也今秦破韓以為長憂得列城而不敢守也伐魏而無功擊趙顧病則秦魏之勇力屈矣楚之故地漢中析酈可得而復有也王出寳弓碆新繳涉鄳塞而待秦之倦也山東河内可得而一也勞民休衆南面稱王矣故曰秦為大鳥負海内而處東面而立左臂據趙之西南右臂傅楚鄢郢膺擊韓魏韓魏當秦之前故云膺擊俗本作鷹非垂頭中國言欲吞山東處既形便勢有地利奮翼鼓􅢄方三千里則秦未可得獨招而夜射也欲以激怒襄王故對以此言襄王因召與語遂言曰夫先王為秦所欺而客死於外怨莫大焉今以匹夫有怨尚有報萬乘白公子胥是也今楚之地方五千里帶甲百萬猶足以踊躍中野也而坐受困臣竊為大王弗取也於是頃襄王遣使於諸侯復為從欲以伐秦魯仲連者齊人也好竒偉俶儻之畫䇿而不肯仕宦任職好持髙節游於趙趙孝成王時而秦王使白起破趙長平之軍前後四十餘萬秦兵遂東圍邯鄲趙王恐諸侯之救兵莫敢擊秦軍魏安釐王使將軍晉鄙救趙畏秦止於蕩隂不進魏王使客將軍新垣衍間入邯鄲因平原君謂趙王曰秦所為急圍趙者前與齊湣王爭強為帝已而復歸帝今齊湣王已益弱方今唯秦雄天下此非必貪邯鄲其意欲復求為帝趙誠發使尊秦昭王為帝秦必喜罷兵去平原君猶豫未有所决此時魯仲連適游趙㑹秦圍趙聞魏將欲令趙尊秦為帝乃見平原君曰事將奈何平原君曰勝也何敢言事前亡四十萬之衆於外今又内圍邯鄲而不能去魏王使客將軍新垣衍令趙帝秦今其人在是勝也何敢言事魯仲連曰吾始以君為天下之賢公子也吾乃今然後知君非天下之賢公子也梁客新垣衍安在吾請為君責而歸之平原君曰勝請為紹介而見之於先生平原君遂見新垣衍曰東國有魯仲連先生者今其人在此勝請為紹介交之於將軍新垣衍曰吾聞魯仲連先生齊國之高士也衍人臣也使事有職吾不願見魯仲連先生平原君曰勝既已泄之矣新垣衍許諾魯連見新垣衍而無言新垣衍曰吾視居此圍城之中者皆有求於平原君者也今吾觀先生之玉貎非有求於平原君者也曷為乆居此圍城之中而不去魯仲連曰世以鮑焦為無從頌音從容而死者皆非也衆人不知則為一身彼秦者棄禮義而上首功之國也權使其士虜使其民彼即肆然而為帝過而為政於天下則連有蹈東海而死耳吾不忍為之民也所為見將軍者欲以助趙也新垣衍曰先生助之將奈何魯連曰吾將使梁及燕助之齊楚則固助之矣新垣衍曰燕則吾請以從矣若乃梁者則吾乃梁人也先生惡能使梁助之魯連曰梁未睹秦稱帝之害故耳使梁睹秦稱帝之害則必助趙矣新垣衍曰秦稱帝之害何如魯連曰昔者齊威王嘗為仁義矣率天下諸侯而朝周周貧且㣲諸侯莫朝而齊獨朝之居歳餘周烈王崩齊後往周怒赴於齊曰天崩地拆天子下席寢苫東藩之臣因齊後至則斮齊威王勃然怒曰叱嗟而母婢也卒為天下笑故生則朝周死則叱之誠不忍其求也彼天子固然其無足怪新垣衍曰先王獨不見夫僕乎十人而從一人者寜力不勝而智不若耶畏之也魯仲連曰嗚呼梁之比於秦若僕邪新垣衍曰然魯仲連曰吾將使秦王烹醢梁王新垣衍怏然不悅曰噫嘻亦太甚矣先生之言也先生又惡能使秦王烹醢梁王魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之於紂紂以為惡醢九侯鄂侯爭之強辯之疾故脯鄂侯文王聞之喟然而歎故拘之羑里之庫百日欲令之死曷為與人俱稱王卒就脯醢之地齊湣王將之魯夷維子為執䇿而從謂魯人曰子將何以待吾君魯人曰吾將以十太牢待子之君夷維子曰子安取禮而來吾君彼吾君者天子也天子廵狩諸侯辟舍納筦籥攝袵抱机視膳於堂下天子已食乃退而聽朝也魯人投其籥謂閉外門不果納不得入於魯將之薛假途於鄒當是時鄒君死湣王欲入弔夷維子謂鄒之孤曰天子弔主人必將倍殯棺陪音佩謂不在殯東階其棺立西階上設北面於南方然後天子南面弔也鄒之羣臣曰必若此吾將伏劒而死固不敢入於鄒鄒魯之臣生則不得事養死則不得賻襚然且欲行天子之禮於鄒魯鄒魯之臣不果納言時君弱臣强故鄒魯之臣生死雖不得盡禮也然猶能不納齊也今秦萬乘之國也梁亦萬乘之國俱據萬乘之國各有稱王之名睹其一戰而勝欲從而帝之是使三晉之大臣不如鄒魯之僕妾也且秦無已而帝則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女䜛妾為諸侯妃姬處梁之宫梁王安得晏然而已乎而將軍又何以得故寵乎於是新垣衍起再拜謝曰始以先生為庸人吾乃今日知先生為天下之士也吾請出不敢復言帝秦秦將聞之為却軍五十里適㑹魏公子無忌奪晉鄙軍以救趙擊秦軍秦軍遂引而去於是平原君欲封魯連魯連辭讓使者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽魯連笑曰所謂貴於天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見以戰國䇿參修安釐王十二年齊楚攻魏秦昭王發兵救魏魏氏復定魏王以秦救之故欲親秦而伐韓以求故地公子無忌謂魏王曰秦與戎翟同俗有虎狼之心貪戻好利無信不識禮義徳行苟有利焉不顧親戚兄弟若禽獸耳此天下之所識也非有所施厚積徳也故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而况於仇讎之國乎今王與秦共伐韓而益近秦患臣甚惑之而王不識則不明羣臣莫以聞則不忠今韓氏以一女子奉一弱主内有大亂吕氏曰韓世家不載其事必是時韓王少母后用事外交强秦魏之兵王以為不亡乎韓亡秦有鄭地與大梁隣王以為安乎王欲得故地今負强秦之親王以為利乎秦非無事之國也韓亡之後必將更事更事必就易與利就易與利必不伐楚與趙矣是何也夫越山踰河絕上黨而攻强趙是復得閼與之事四十五年趙奢敗秦閼與秦必不為也若道河内倍鄴朝歌絕漳滏水與趙兵决於邯鄲之郊是知伯之禍也秦又不敢伐楚道渉山谷行三千里而攻冥阨之塞括地志云石城山在中州鍾山縣東南共一里攻冥阨即此山中州今信陽軍所行甚逺所攻甚難秦又不為也若道河外倍大梁右蔡左召陵徐廣云一無左字與楚兵决於陳郊秦又不敢故曰秦必不伐楚與趙矣又不攻衛與齊矣夫韓亡之後兵出之日非魏無攻已秦固有懷茅邢丘城垝津以臨河内河内共汲必危索隠日皆縣名屬河内秦有鄭地得垣雍决濙澤水灌大梁大梁必亡王之使者出過而惡安陵氏於秦吕氏按戰國䇿安陵君曰吾先君成侯受詔襄王以守此地蓋安陵趙襄子所封其後遂别為小國附庸於魏今魏反令使者譛之於秦也古史云魏襄王所封秦之欲誅之久矣秦葉陽昆陽與舞陽隣聽使者之惡之隨安陵氏而亡之繞舞陽之北以東臨許南國必危南國雖無危正義曰在魏之南故曰南國則魏國豈得安哉夫憎韓不愛安陵氏可也夫不患秦之不愛南國非也吕曰秦得南國則諸侯之勢危矣魏不可以為非已地而不恤也異日者秦在河西晉國之去梁也千里有河山以闌之有周韓以間之從林鄉軍以至於今吕曰自秦伐林鄉以來以至於今也秦七攻魏五入囿中索隠日囿即圃田圃田鄭藪屬魏戰國䇿作國中邊城盡拔文臺堕垂都焚林木伐麋鹿盡而國繼以圍吕曰赧王四十年穰侯遂圍大梁又長驅梁北東至陶衛之郊吕曰陶即穰侯所封北至平監平即兖州平陸縣監即故關城在平陸縣西南所亡於秦者山南山北河外河内大縣數十名都數百秦乃在河西晉去梁千里而禍若是矣又况於使秦無韓有鄭地無河山而闌之無周韓而間之去大梁百里禍必百此矣異日者從之不成也楚魏疑而韓不可得也今韓受兵三年秦撓之以講韓知亡猶不聽投質於趙請為天下鴈行頓刃楚趙必集兵皆識秦之欲無窮也非盡亡天下之國而臣海内必不休矣是故臣願以從事乎王謂合從事王也王速受楚趙之約而挾韓之質以存韓而求故地韓必效之此士民不勞而故地得其功多於與秦共伐韓而又與強秦隣之禍也夫存韓安魏而利天下此亦王之天時也通韓上黨於共寗使道安城戰國策作使道已通中吕曰是時秦欲取韓上黨故蚕食其地使與韓國絶故信陵君勸魏假道使韓得與上黨往來豈専為韓而已哉韓不失上黨則三晉之勢猶完也因而關之出入者賦之是魏重質韓以其上黨也今有其賦足以富國韓必徳魏愛魏重魏畏魏韓必不敢反魏是韓則魏之縣也魏得韓以為縣衛大梁河外必安矣今不存韓二周安陵必危楚趙大破衛齊甚畏天下西鄉而馳秦入朝而為臣不乆矣以戰國䇿參修東萊吕氏曰信陵之言深切綜練識天下之大勢使魏王能用其計紏率楚趙竭力以助韓則韓不至於失上黨趙不至於敗長平六國亦不至為秦所吞矣秦既解邯鄲圍而趙王入朝使趙郝約事於秦割六縣而媾虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦之攻我也不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦復攻王王無救矣王以虞卿之言告趙郝趙郝曰虞卿誠能盡秦力之所至乎誠知秦力之所不能進此彈丸之地弗與令秦來年復攻王王得無割其内而媾乎王曰請聽子割矣子能必使來年秦之不復攻我乎趙郝對曰此非臣之所敢任也他日三晉之交於秦相善也今秦善韓魏而攻王王之所以事秦必不如韓魏也今臣為足下解負親之攻開關通幣齊交韓魏至來年而王獨取攻於秦此王之所以事秦必在韓魏之後也此非臣之所敢任也王以告虞卿虞卿對曰郝言不媾來年秦復攻王王得無割其内而媾乎今媾郝又以不能必秦之不復攻也今雖割六城何益來年復攻又割其力之所不能取而媾此自盡之術也不如無媾秦雖善攻不能取六縣趙雖不能守終不失六城秦倦而歸兵必罷我以六城收天下以攻罷秦是我失之於天下而取償於秦也吾國尚利孰與坐而割地自弱以強秦哉今郝曰秦善韓魏而攻趙者必以為韓魏不救趙也而王之軍必孤有以王之事秦不如韓魏也是使王歳以六城事秦也即坐而城盡來年秦復求割地王將與之乎弗與是棄前功而挑秦禍也與之則無地而給之語曰強者善攻弱者不能守今坐而聽秦秦兵不敝而得地是強秦而弱趙也以益強之秦而割愈弱之趙其計故不止矣且王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣以戰國䇿參修韓信為治粟都尉上未之竒也信數與蕭何語何竒之至南鄭諸將行道亡者數十人信度何等已數言上上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上大怒如失左右手居一二日何來謁上上且怒且喜罵何曰若亡何也何曰臣不敢亡也臣追亡者上曰若所追者誰何曰韓信也上復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得耳至如信者國士無雙王必欲長王漢中無所事信必欲爭天下非信無所與計事者顧王䇿安所决耳上曰吾亦欲東耳安能鬱鬱乆居此乎何曰王計必欲東能用信信即留不能用信終亡耳王曰吾為公以為將何曰雖為將信必不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素慢無禮今拜大將如呼小兒耳此乃信所以去也王必欲拜之擇良日齊戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃韓信也一軍皆驚信拜禮畢上坐王曰丞相數言將軍將軍何以教寡人計䇿信謝因問王曰今東鄉爭權天下豈非項王耶漢王曰然曰大王自料勇悍仁彊孰與項王漢王黙然良乆曰不如也信再拜賀曰惟信亦為大王不如也然臣甞事之請言項王之為人也項王喑啞叱咤千人皆廢然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔人有疾病涕泣分食飲至使人有功當封爵者印刓弊忍不能予此所謂婦人之仁也項王雖霸天下而臣諸侯不居闗中而都彭城有背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特刼於威強耳名雖為霸實失天下心故曰其彊易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數歳矣所殺亡不可勝計又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所犯除秦苛法與秦民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中民咸知之大王失職入漢中秦民無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂使信計部署諸將所擊漢三年秋項羽擊漢拔滎陽漢兵遁保鞏洛楚人聞淮隂侯破趙彭越數反梁地則分兵救之淮隂方東擊齊漢王數困滎陽成臯計欲捐成臯以東屯鞏洛以拒楚酈生因曰臣聞知天之天者王事可成不知天之天者王事不可成王者以民人為天而民人以食為天夫敖倉天下轉輸乆矣臣聞其下廼有藏粟甚多楚人抜滎陽不堅守敖倉廼引而東令適卒分守成臯此乃天所以資漢也方今楚易取而漢反却自奪其便臣竊以為過矣且两雄不俱立楚漢乆相持不决百姓騷動海内揺蕩農夫釋耒工女下機天下之心未有所定也願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜太行之道距蜚狐之口守白馬之津以示諸侯効實形制之勢則天下知所歸矣方今燕趙已定唯齊未下今田廣據千里之齊田間將二十萬之衆軍於厯城諸田宗彊負海阻河濟南近楚人多變詐足下雖遣數十萬師未可以歳月破也臣請得奉明詔說齊王使為漢而稱東藩上曰善乃從其畫復守敖倉而使酈生說齊王曰王知天下之所歸乎王曰不知也曰王知天下之所歸則齊國可得而有也若不知天下之所歸則齊國未可得保也齊王曰天下何所歸曰歸漢曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之漢王先入咸陽項王負約不與而王之漢中項王遷殺義帝漢王聞之起蜀漢之兵擊三秦出闗而責義帝之負收天下之兵立諸侯之後降城即以侯其將得賂即以分其士與天下同其利豪英賢才皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下項王有倍約之名殺義帝之負於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印刓而不能授攻城得賂積而不能賞天下畔之賢才怒之而莫為之用故天下之士歸於漢王可坐而䇿也夫漢王發蜀漢定三秦涉西河之外援上黨之兵下井陘誅成安君破北魏舉三十二城此蚩尤之兵也非人之力也天之福也今已據敖倉之粟塞成臯之險守白馬之津杜太行之險距蜚狐之口天下後服者先亡矣王疾先下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然迺聽酈生罷厯下兵守戰備賈生之過秦曰秦孝公據殽函之固擁雍州之地君臣固守以闚周室有席巻天下包舉宇内囊括四海并吞八荒之心當是時也商君佐之内立法度務耕織修守戰之備外連衡而鬬諸侯於是秦人拱手而取西河之外孝公既沒惠文武昭襄䝉故業因遺册南取漢中西舉巴蜀東割膏腴之地北收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寳肥饒之地以致天下之士合從締交相與為一當此之時齊有孟甞趙有平原楚有春申魏有信陵此四賢者皆明智而忠信寛厚而愛人尊賢重士約從離横兼韓魏燕楚齊趙宋衛中山之衆於是六國之士有寗越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意呉起孫臏帯他兒良王廖田忌廉頗趙奢之倫制其兵嘗以十倍之地百萬之師仰史作卭闗而攻秦顔曰秦之地形高而諸侯之兵欲攻開中者仰嚮故云仰闗也今流俗書本仰字作卭非也秦人開闗延敵九國之師逡廵而不敢進秦無亡矢遺鏃之費而天下已困矣於是從散約敗爭割地而賂秦秦有餘力而制其敝追士逐北伏尸百萬流血漂鹵因利乘便宰割天下分裂山河強國請服弱國入朝施及孝文莊襄王享國之日淺國家無事及至始皇奮六世之餘烈振長䇿而馭宇内吞二周而亡諸侯履至尊而制六合執敲朴以鞭笞天下威震四海南取百粤之地以為桂林象郡百粤之君頫首係頸委命下吏迺使䝉恬北築長城而守藩籬却匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱天下之民然後踐史作斬華為城服䖍曰斷華山為城晉灼曰踐登也顔曰晉說是因河為池據億丈之城臨不測之川以為固良將勁弩守要害之處信臣精卒陳利兵而誰何顔曰問之為誰又云何人其義一也天下已定始皇之心自以為闗中之固金城千里子孫帝王萬世之業也始皇既沒餘威震于殊俗然而陳涉甕牖繩樞之子服䖍曰以繩係户樞孟康曰瓦甕為牎也甿𨽻之人遷徙之徒也材能不及中人非有仲尼墨翟之智陶朱猗頓之富躡足行伍之間而倔起阡陌之中帥罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲合響應贏粮而景從山東豪俊遂並起而亡秦族矣且天下非小弱也雍州之地殽函之固自若也陳涉之位非尊於齊楚燕趙韓魏宋衛中山之君鉏耰棘矜非錟於鉤㦸長鍛也顔曰棘㦸也矜與􅚙同謂矛鋌之把也鉤㦸㦸刅曲鉤者也鍛鈹也言往者蠢銷兵刅陳涉起但用鉏耰及戈㦸之􅚙以相攻戰也適戍之衆非抗於九國之師深謀逺慮行軍用兵之道非及曩時之士也然而成敗異變功業相反何也試使山東之國與陳涉度長絜大比權量力不可同年而語矣然秦以區區之地致萬乗之權招八州而朝同列百有餘年矣然後以六合為家殽函為宫一夫作難而七廟隳身死人手為天下笑者何也仁誼不施而攻守之勢異也太史公曰先人有言自周公卒五百歳而有孔子孔子卒後至於今五百歳有能紹明世正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓焉上大夫壺遂曰昔孔子何為而作春秋哉太史公曰余聞董生曰周道衰廢孔子為魯司寇諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以為天下儀表貶天子退諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辯人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也易著天地隂陽四時五行故長於變禮經紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辯是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本已故易曰失之毫釐差以千里故曰臣弑君子弑父非一旦一夕之故也其漸乆矣故有國者不可以不知春秋前有讒而弗見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通於春秋之義者必䝉首惡之名為人臣子而不通於春秋之義者必陷簒弑之誅死罪之名其實皆以為善為之不知其義被之空言而不敢辭夫不通禮義之㫖至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過予之則受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否不然余聞之先人曰伏犧至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之徳褒周室非獨刺譏而已也漢興以來至明天子獲符瑞封禪改正朔易服色受命於穆清澤流罔極海外殊俗重譯款塞請來獻見者不可勝道臣下百官力誦聖徳猶不能宣盡其意且士賢能而不用有國者之恥主上明聖而徳不布聞有司之過也且余嘗掌其官廢明聖盛徳不載滅功臣世家賢大夫之業不述堕先人所言罪莫大焉余所謂述故事整齊其世傳非所謂作也而君比之於春秋謬矣於是論次其文七年而太史公遭李陵之禍幽於縲紲乃喟然而歎曰是余之罪也夫是余之罪也夫身毁不用矣退而深惟曰夫詩書隠約者欲遂其志之思也昔西伯拘羑里演周易孔子戹陳蔡作春秋屈原放逐著離騷左丘失明厥有國語孫子臏脚而論兵法不韋遷蜀世傳吕覽韓非囚秦說難孤憤詩三百篇大抵賢聖發憤之所為作也此人皆意有所鬱結不得通其道也故述往事思來者於是卒述陶唐以來至于麟止自黄帝始維我漢繼五帝末流接三代統業周道廢秦撥去古文焚滅詩書故明堂石室金匱玉版圖籍散亂於是漢興蕭何次律令韓信申軍法張蒼為章程叔孫通定禮儀則文學彬彬稍進詩書往往間出矣自曹參薦蓋公言黄老而賈生晁錯明申商公孫𢎞以儒顯百年之間天下遺文古事靡不畢集太史公太史公漢書無三字仍父子相續纂其職曰於戲余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至於余乎欽念哉欽念哉罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略推三代録秦漢上記軒轅下至于兹著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律厯改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔拂股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補藝成一家之言厥恊六經異傳整齊百家雜語藏之名山副在京師俟後世聖人君子以漢史參修劉訓輕天下則神無累矣細萬物則心不惑矣齊死生則志不懾矣同變化則明不眩矣衆人以為虚言吾將舉類而實之人之所以樂為人主者以其窮耳目之欲而適躬體之便也今高臺層榭人之所麗也而堯樸桷不斵素題不枅珍怪竒味人之所美也而堯糲粢之飯藜藿之羮文繡狐白人之所好也而堯布衣揜形鹿裘蔽寒養性之具不加厚而增之以任重責大故舉天下而傳之于舜若解敝蹝然非直辭讓議無以為也此輕天下之甚也禹南省方濟於江黄龍負舟舟中之人五色無主禹乃熙笑而稱曰我受命於天竭力而勞萬民生寄也死歸也何足以滑和視龍猶蝘蜒顔色不變龍乃弭耳掉尾而逝禹之視物亦細矣鄭之神巫相壺子林見其徵告列子列子行泣告壺子壺子持以天壤名實不入機發於踵壺子之視死生亦齊矣子求行年五十有四而病傴僂脊管高于頂􅠽音歇肝胷下迫頥兩髀在上燭營指天匍匐自窺於井曰偉哉造化其以我為此拘拘邪此其視變化亦同矣故覩堯之道乃知天下之輕也觀禹之志乃知萬物之細也原壺子之論乃知死生之齊也見子求之行乃知變化之同也精神訓堯不以有天下為貴故授舜公子札不以有國為尊故讓位子罕不以玉為富故不受寳務光不以生害義故自投於淵由此觀之至貴不待爵至富不待財天下至大矣而以與他人也身至親矣而棄之淵外此其餘無足利矣此之謂無累之人無累之人不以天下為貴矣上觀至人之諭深原道徳之意以下考世俗之行乃足羞也故通許由之意金縢豹韜廢矣延陵季子不受呉國而訟閒田者慙矣子罕不利寳玉而爭劵契者媿矣務光不汙於世而貪利偷生者悶矣故不觀大義者不知生之不足貪也不聞大言者不知天下之不足利也今夫窮鄙之社也叩盆拊瓴相和而歌自以為樂矣嘗試為之擊逢皷撞巨鐘乃性仍仍然知其盆瓴之足羞也藏詩書修文學而不知至論之㫖則拊盆叩瓴之徒也精神訓凡人所以生者衣與食也今囚之𡨕室之中雖養之以芻豢衣之以綺繡不能樂也以目之無見耳之無聞穿隙穴見雨零則快然而歎之况開户發牖從㝠㝠見昭昭乎從㝠㝠見昭昭猶尚肆然而喜又况出室坐堂見日月光見日月光曠然而樂又况登太山履齊封以望八荒視天都若蓋江河若帶又况萬物在其間者乎其為樂豈不大哉且聾者耳形具而無能聞也盲者目形存而無能見也夫言者所以通已於人也聞者所以通人於已也瘖者不言聾者不聞既瘖且聾人道不通故有瘖聾之病者雖破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之夫指之拘也莫不事伸也心之塞也莫知務通也不明於類也夫觀六藝之崇廣窮道徳之淵深達乎無上至乎無下運乎無極翔乎無形廣於四海崇於大山富於江河曠然而通昭然而明天地之間無所繫戾其所以覽觀豈不大哉泰族訓揚子雲客難客難揚子曰凡著書者為衆人之所好也美味期乎合口工聲調於比耳今吾子乃抗辭幽說閎意眇指獨馳騁於有亡之際而陶冶大鑪旁薄羣生厯覽者兹年矣而殊不寤亶費精神於此而煩學者於彼譬畫者畫於無形弦者放於無聲殆不可乎揚子曰俞若夫閎言崇議幽㣲之塗蓋難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深昔人之辭迺玉迺金彼豈好為艱難哉埶不得已也獨不見夫翠虬絳螭之將登乎天必聳身於蒼梧之淵不階浮雲翼疾風虚舉而上升則不能撠膠葛撠拘也膠葛上清之氣也騰九閎日月之經不千里則不能燭六合耀八絃泰山之高不嶕嶢則不能浡滃雲而散歊烝是以宓羲氏之作易也綿絡天地經以八卦文王附六爻孔子錯其象而彖其辭然後發天地之藏定萬物之基典謨之篇雅頌之聲不温純滯潤則不足以揚鴻烈而章緝熙蓋胥靡為宰寂寞為尸大味必淡大音必希大語呌呌大道低回是以聲之眇音妙者不可同於衆人之耳形之美者不可混於世俗之目辭之衍者不可齊於庸人之聽今夫弦者高張急徽追趨逐耆則坐者不期而附試為之施咸池揄六莖發簫韶詠九成則莫有和也是故鍾期死伯牙絶絃破琴而不肯與衆鼓􅚽人亡􅚽古之善塗塈者音乃高反則匠石輟斤而不敢妄斵師曠之調鐘竢知音者之在後也孔子作春秋幾君子之前睹也老耼有遺言貴知我者希此非其操歟妙絶古今巻二
