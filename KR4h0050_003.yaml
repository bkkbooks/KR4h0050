body:
  text: 妙絶古今巻三宋湯漢編劉歆移太常博士書歆欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對歆因移書太常博士責讓之曰昔唐虞既衰而三代迭興聖帝明王累起相襲其道甚著周室既㣲而禮樂不正道之難全也如此是故孔子憂道之不行厯國應聘自衛反魯然後樂正雅頌乃得其所修易序書制作春秋以紀帝王之道及夫子沒而㣲言絶七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔子之道抑而孫呉之術興陵夷至于暴秦燔經書殺儒士設挾書之灋行是古之罪道術由是遂滅漢興去聖帝明王遐逺仲尼之道又絶灋度無所因襲時獨有一叔孫通畧定禮儀天下唯有易卜未有他書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介冑武夫莫以為意至孝文皇帝始使掌故晁錯從伏生受尚書尚書初出於屋壁朽折散絶今其書見在時師傳讀而已詩始萌芽天下衆書往往頗出皆諸子傳説猶廣立於學官為置博士在漢朝之儒惟賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脱朕甚閔焉時漢興已七八十年離於全經固已遠矣及魯共王壞孔子宅欲以為宫而得古文於壞壁之中逸禮有三十九書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所修皆古文舊書多者二十餘通藏於秘府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發秘藏校理舊文得此三事以考學官所傳經或脱簡傳或間編傳問民間則有魯國柏公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕苟因陋就寡分文析字煩言碎辭學者罷老且不能究其一藝信口説而背傳記是末師而非往古至於國家將有大事若立辟雍封禪巡狩之儀則幽㝠而莫知其原猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懷妬嫉不考情實雷同相從隨聲是非抑此三學以尚書為備謂左氏為不傳春秋豈不哀哉今聖上徳通神明繼綂揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓樂與士君子同之故下明詔試左氏可立不遣近臣奉指銜命將以輔弱扶㣲與二三君子比意同力冀得廢遺今則不然深閉固拒而不肯試猥以不誦絶之欲以杜塞餘道絶滅㣲學夫可與樂成難與慮始此乃衆庻之所為耳非所望士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徴騐外内相應豈苟而已哉夫禮失求之於野古文不猶愈於野乎往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶廣立穀梁春秋梁丘易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之傳曰文武之道未墜於地在人賢者識其大者不賢者識其小者今此數家之言所以兼包大小之義豈可偏絶哉若必専已守殘黨同門妬道真違明詔失聖意以陷於文吏之議甚為二三君子不取也其言甚切諸儒皆怨恨諸葛忠武侯出漢中疏先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於内忠志之士忘身於外者葢追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺徳恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諌之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使内外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡㧞以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補缺漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵以為督愚以為營中之事悉以咨之必能使行陣和穆優劣得所親賢臣遠小人此先漢所以興隆也親小人遠賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不嘆息痛恨於桓靈也侍中尚書陳震長史參軍蔣琬皆悉貞亮死節之臣也願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽苟全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂勤恐付托不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當奬帥三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣之所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之咎以彰其慢陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕泣不知所云董允傳載此數語云若無興復之效則戮允等以彰其慢出散闗䟽先帝慮漢賊不兩立王業不偏安故托臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵彊也然不伐賊王業亦亡惟坐而待亡孰與伐之是故托臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛幷日而食臣非不自惜也顧王業不可偏安於蜀都故冐危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左高帝明並日月謀臣淵深然陟險被創危然後安今陛下未及高帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胷今歲不戰明年不征使孫䇿强大坐并江東此臣之未解二也曹操知計殊絶於人其用兵也髣髴孫吳然困於南陽險於烏巢危於祈連偪於黎陽幾敗北山殆死潼闗然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年矣然喪趙雲陽羣馬玉閻芝丁立白壽劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之内所紏合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今則民窮兵疲而事不可息事不可息則住與行勞費正等而不及蚤圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下以定然後先帝東連呉越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後呉更違盟闗羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也韓子獲麟解麟之為靈昭昭也詠於詩書於春秋雜出於傳記百家之書雖婦人小子皆知其為祥也然麟之為物不畜於家不恒有於天下其為形也不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為牛鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟麟之果不為不祥也又曰麟之所以為麟者以徳不以形若麟之出不待聖人則其謂之不祥也亦宜哉麟以徳為祥若不待聖人而出是其徳之衰也故謂之不祥亦可矣以春秋之世而麟出焉故魯人以為不祥然有仲尼識之是麟為仲尼出也則麟果不為不祥矣哉圬者王承福傳西山云韓文當以此為第一圬之為伎賤且勞者也有業之其色若自得者聽其言約而盡問之王其姓承福其名世為京兆長安農夫天寳之亂發人為兵持弓矢十三年有官勲棄之來歸喪其土田手鏝衣食餘三十年舍於市之主人而歸其屋食之當焉視時屋食之貴賤而上下其圬之傭以償之有餘則以與道路之廢疾餓者焉又曰粟稼而生者也若布與帛必蠶績而後成者也其他所以養生之具皆待人力而後完也吾皆賴之然人不能徧為宜乎各致其能以相生也故君者理我所以生者也而百官者承君之化者也任有小大惟其所能若器皿焉食焉而怠其事必有天殃故吾不敢一日捨鏝以嬉夫鏝易能可力焉又誠有功取其直雖勞無媿吾心安焉夫力易强而有功也心難强而有智也用力者使於人用心者使人亦其宜也吾特擇其易為而無愧者取焉嘻吾操鏝以入於富貴之家有年矣有一至者焉又往過之則為墟矣有再至三至者焉而往過之則為墟矣問其鄰或曰噫刑戮也或曰身既死而其子孫不能有也或曰死而歸之官也吾以是觀之非所謂食焉怠其事而得天殃者邪非强心以智而不足不擇其才之稱否而冐之者邪非多行可愧知已不可而强為之者邪將富貴難守薄功而厚饗者邪抑豐悴有時一去一來而不可常者邪吾之心憫焉是故擇其力之可能者行焉樂富貴而悲貧賤我豈異於人哉又曰功大者其所以自奉也博妻與子皆養於我者也吾能薄而功小不有之可也又吾所謂勞力者若立吾家而力不足則心又勞也一身而二任焉雖聖者不可能也愈始聞而惑之又從而思之葢賢者也葢所謂獨善其身者也然吾有譏焉謂其自為也過多其為人也過少其學楊朱之道者邪楊之道不可㧞我一毛而利天下而夫人以有家為勞心不肯一動其心以畜其妻子其肯勞其心以為人乎哉雖然其賢於世之患不得之而患失之者以濟其生之欲貪邪而亡道以喪其身者其亦遠矣又其言有可以警余者故余為之傳而自覽焉此篇大㮣以二又曰字述盡承福之為人後面却就第二個又曰以下抑之就第三個又曰以下揚之荅李翺書愈白李生足下生之書辭甚髙而其問何下而恭也能如是誰不欲告生以其道道徳之歸也有日矣况其外之文乎抑愈所謂望孔子之門墻而不入於其宫者也烏足以知是且非邪雖然不可不為生言之生所謂立言者是也生所為者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人者邪將蘄至於古之立言者邪蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利養其根而俟其實加其膏而希其光根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戞戞乎其難哉其觀于人也不知其非笑之為非笑也如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黒分矣而務去之乃徐有得也當其取於心而注於手也汨汨然來矣其觀於人也笑之則心以為喜譽之則心以為憂以其猶有人之説者存也如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而拒之平心而察之其皆醇也然後肆焉雖然不可以不養也行之乎仁義之塗游之乎詩書之源無迷其塗無絶其源終吾身而已矣氣水也言浮物也水大而物之浮者小大畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾於成乎雖幾於成其用於人也奚取焉雖然待用於人者其肖於器則時用焉用與舍屬諸人君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後世法如是者其亦足樂乎其無足樂也有志乎古者希矣志乎古必遺乎今吾誠樂而悲之亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不至乎利聊相為言之送孟東野序趙南塘云凡有懐而欲吐者皆為不得其平非必有所憤激也大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其謌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推奪其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴䕫弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而遠傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴於楚楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非慎到田駢鄒衍尸校孫武張儀蘓秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏之鳴者不及於古然亦未嘗絶也就其善鳴者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章將天醜其徳莫之顧邪何為乎不鳴其善鳴者也唐之有天下陳子昻蘓源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出晉魏不懈而及於古其他浸淫乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善矣抑不知天將和其聲而使鳴國家之盛邪抑將窮餓其身思愁其心腸而使自鳴其不幸邪三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之此篇謂凡形之於聲皆不得已於不得已之中又有善不善者焉所謂善者又有幸不幸之分則係乎天也送文暢序人固有儒名而墨行者問其名則是校其行則非可以與之游乎如有墨名而儒行者問其名則非校其行則是可以與之游乎揚子雲稱在門墻則揮之在夷狄則進之吾取以為法焉浮圖文暢喜文章其周遊天下凡有行必請於搢紳先生以求詠歌其所志貞元十九年春將行東南栁君宗元為之請解其裝得所叙詩累百餘篇非至篤好其何能致多如是邪惜其無以聖人之道告者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物禮樂之盛其心必有慕焉拘其法而未能入故樂聞其説而請之如吾徒者宜當告之以二帝三王之道日月星辰之所以行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之邪夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之為已害也猶且不脱焉弱之肉彊之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自邪夫不知者非其人之罪也知而不為之者惑也悦乎故不能即乎新者弱也知而不以告之者不仁也告而不以實者不信也余既重栁請又嘉浮屠能喜文辭於是乎言平淮西碑西山枺本天以唐克肖其徳聖子神孫繼繼相承於千萬年敬戒不怠全付所覆四海九州罔有内外悉主悉臣高祖太宗既除既治髙宗中睿休養生息至於𤣥宗受報收功極熾而豐物衆地大孽芽其間肅宗代宗徳順祖考以勤以容大慝適去稂莠不薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝乃考圖數貢曰鳴呼天既全付予有家今傳次在予予不能事事其何以見於郊廟羣臣震懾奔走率職明年平夏又明年平蜀又明年平江東又明年平澤潞遂定易定致魏愽貝衛澶相無不從志皇帝曰不可究武予其少息九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄等城以動東都放兵四刼皇帝厯問于朝一二臣外皆曰蔡帥之不廷授于今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆決唱聲萬口和附并為一談牢不可破皇帝曰惟天惟宗祖所以付任予者庶其在此予何敢不力況一二臣同不為無助曰光顔汝為陳許帥維是河東魏博郃陽三軍之在行者汝皆將之曰重𦙍汝故有河陽懐今益以汝維是朔方義成陜益鳯翔延慶七軍之在行者汝皆將之曰𢎞汝以卒萬二千屬而子公武集往討之曰文通汝守壽維是宣武淮南宣歙浙西四軍之行於壽者汝皆將之曰道古汝其觀察鄂岳曰愬汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝予同汝遂相予以賞罰用命不用命曰𢎞汝其以節度都綂諸軍曰守謙汝出入左右汝惟近臣其往撫師曰度汝其往衣服飲食予士無寒無饑以既厥事遂生蔡人賜汝節斧通天御帶衞卒三百凡兹廷臣汝擇自從惟其賢能無憚大吏庚申予其臨門送汝曰御史予閔士大夫戰甚苦自今以往非郊廟祠祀其無用樂顔𦙍武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降卒萬三千再入申破其外城文通戰其東十餘遇降萬二千愬入其西得賊將輙釋不殺用其䇿戰比有功十二年八月丞相度至師都綂𢎞責戰益急顔𦙍武合戰益用命元濟盡并其衆洄曲以備十月壬申愬用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛巳丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縱之斬元濟於京師冊功𢎞加侍中愬為左僕射帥山南東道顔𦙍皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師進封晉國公進階金紫光禄大夫以舊官相而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈臣愈再拜稽首而獻文曰唐承天命遂臣萬方孰居近土襲盜以狂往在𤣥宗崇極而圮河北悍驕河南附起四聖不宥屢興師征有不能尅益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百隷怠官事亡其舊帝時繼位顧瞻咨嗟惟汝文武孰恤予家既斬呉蜀旋取山東魏將首義六州降從淮蔡不順自以為强提兵呌讙欲事故常始命討之遂連姦鄰陰遣刺客來賊相臣方戰未利内驚京師羣公上言莫若惠來帝為不聞與神為謀乃相同徳以訖天誅乃敕顔𦙍愬武古通咸綂於𢎞各奏汝攻三方分攻五萬其師大軍北乘厥數倍之常兵洄曲軍士蠢蠢既剪陵雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者頟頟蔡城其疆千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告饑船粟往哺蔡人告寒賜以繒布始時蔡人禁不往來今相從戯里門夜開始時蔡人進戰退戮今旰而起左飱右粥為之擇人以收餘憊選吏賜牛教而不税蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾强不支汝弱奚恃其告而長而父而兄奔走偕來同我太平淮蔡為亂天子伐之既伐而饑天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來遂開明堂坐以治之柳子厚梓人傳裴封叔之第在光徳里有梓人欵其門願傭隟宇而處焉所職尋引規矩䋲墨家不居襲斵之器問其能曰吾善度材視棟宇之制高深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食於官府吾受禄三倍作於私家吾收其直太半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪禄嗜貨者其後京兆尹將飾官署余往過焉委羣材㑹衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斵刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宫於堵盈尺而曲盡其制計其毫釐而構大厦無進退焉既成書於上棟曰某年某月某日某建則某姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而嘆曰彼將捨其手藝専其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒隸為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩䋲墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其遠邇細大可手據其圖而究焉猶梓人畫宫於堵而績于成也能者進而用之使無所徳不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也大哉相乎通是道者所謂相而已矣其不知體要者反此以恪謹為公以簿書為尊衒能矜名親小勞侵衆官竊取六職百役之事日聽於府廷而遺其大者遠者焉所謂不通是道者也猶梓人而不知䋲墨之曲直規矩之方圓尋引之短長姑奪衆工之斧斤刀鋸以佐其藝又不能備其工以至敗績用而無所成也不亦謬歟或曰彼主為室者儻或發其私智牽制梓人之慮奪其世守而道謀是用雖不能成功豈其罪邪亦在任之而已余曰不然夫䋲墨誠陳規矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圮彼將樂去固而就圮也則巻其術黙其智悠爾而去不屈吾道是誠良梓人耳其或嗜其貨利忍而不能捨也喪其制量屈而不能守也棟撓屋壞則曰非我罪也可乎哉可乎哉余謂梓人之道類於相故書而藏之梓人葢古之審曲面勢者今謂之都料匠云余所遇者楊氏潛其名杜牧之守論往年兩河盜起屠囚大臣刼戮二千石國家不議誅洗東兵自守反修大厯貞元故事而行姑息之政是使逆輩益横終唱患禍故作守論焉厥今天下何如哉干戈朽鈇鉞鈍含𢎞混貸煦育逆孽而殆為故常而執事大人曽不厯筭周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也鳴呼其不知乎其俟蹇頓顛傾而後為之支計乎且天下幾里列郡幾所而自河以北蟠城數百金堅蔓織角奔為寇伺吾人之顦顇天時之不利則將與其朋伍羅絡郡國將駭亂吾民於掌股之上耳今者及吾之壯不圖擒取而乃偷處恬逸次第相符以為後世子孫背脅疽根此復何也今之議者咸曰夫屈强之徒吾以良將勁兵以為衘䇿高位美爵充飽其腸安而不撓外而不拘亦猶豢擾虎狼而不拂其心則忿氣不萌此大厯貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大厯貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷待之貸以法故於是乎闊視大言自樹一家破制削法角為尊奢天子養威而不問有司守恬而不呵王侯通爵越録受之覲聘不來几杖扶之逆息虜𦙍皇子嬪之裝縁采飾無不備之是以地益廣兵益强僣擬益甚侈心益昌於是土田名器分劃殆盡而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立恬淡不畏走兵四畧以飽其志者也是以趙魏燕齊卓起大倡梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是運遭孝武宵旰不忘前英後傑夕思朝議故能大者誅鋤小者惠來不然周秦之郊幾為犯獵哉大抵生人油然多欲欲而不得則怒怒則争亂隨之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大厯貞元之間盡反此道提區區之有而塞無涯之爭是以首尾指支幾不能相運掉也今者不知此非而反用以為經愚見為盜者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉范文正公嚴先生祠堂記晦菴云胡文定父子最輕下人獨服此記云先生光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆天下孰加焉惟先生以節高之既而動星象歸江湖得聖人之清泥塗軒冕天下孰加焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯高尚其事先生以之在屯之初九陽徳方亨而能以貴下賤大得民也光武以之葢先生之心出乎日月之上光武之量包乎天地之外㣲先生不能成光武之大微光武豈能遂先生之髙哉而使貪夫亷懦夫立是大有功於名教也仲淹來守是邦始構堂而奠焉乃復為其後者四家以奉祠事又從而歌曰雲山蒼蒼江水泱泱先生之風山高水長妙絶古今巻三
