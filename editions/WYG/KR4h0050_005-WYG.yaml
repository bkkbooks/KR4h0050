body:
  text: 妙絶古今後序夫理道載於六籍文學著於四科聖人教人以文欲其因文以入道也然教以博文為先而文以體要為尚若畔經而離道文雖工而弗庸矣自秦以後士多有離道而為文者雖求古文於孔壁收竹書於汲冡家握鉛素未嘗不勤求其發明理道而羽翼聖經者葢未多見其人焉即梁昭明文選姚鉉文粹二書所録傳者果皆理道之正乎茲妙絶古今一書葢宋人所選謂文章之精絶者一代不數人而一人不數篇自春秋而迄歐蘇氏得七十有九首葢千載之英華萃矣觀其所載多左氏國語莊列荀揚韓栁之詞其體近乎古而其義切於用者然後取之其與後之騁虚詞而亡實用者異矣夫吾道本中庸而聖人無絶徳其云妙絶古今者謂文章必有法程而凡操觚染翰者固當究心乎體要歟宋真西山集文章正宗學者宗焉當時亟稱此書則在宋已爭傳矣䖍之蕭蘭氏得善本梓之今中丞十山談公序於首簡謂觀者當求於驪黄牝牡之外誠嘉惠後學之盛心也故題其跋焉嘉靖乙卯夏五月既望賜進士第中憲大夫江西南安府知府陵陽王廷幹書
