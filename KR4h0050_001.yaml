body:
  text: 妙絶古今卷一宋湯漢編左氏范宣子為政諸侯之幣重鄭人病之鄭伯如晉子産寓書於子西以告宣子寓寄也曰子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯二二離也若吾子賴之則晉國二賴恃用之諸侯二則晉國壞晉國二則子之家壞何沒沒也沒沒沈滅之言將焉用賄夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫上帝臨女無二爾心有令名也夫恕思以明德則令名載而行之是以逺至邇安毋寧使人謂子子實生我無寧寧也而謂子浚我以生乎浚取也象有齒以焚其身賄也焚斃也宣子說乃輕幣襄公二十四年襄公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壞其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不修冦盜充斥無若諸侯之屬辱在寡君者何是以令吏人完客所館髙其閈閎厚其牆垣以無憂客使今吾子壞之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆葺覆也以待賓客若皆毁之其何以共命寡君使丐請命請問毁垣之命對曰以敝邑褊小介於大國誅求無時誅責也是以不敢寧居悉索敝賦以來㑹時事隨時來朝㑹逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也薦陳猶獻見也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廄繕修司空以時平易道路圬人以時塓館宫室諸侯賓至甸設庭燎僕人巡宫巡宫行夜車馬有所有所處賓從有代代客役巾車脂轄巾車主車之官𨽻人牧圉各曕其事曕視客所當得百官之屬各展其物展陳也謂羣官各陳其物以待賓公不留賓而亦無廢事憂樂同之事則巡之巡行也教其不知而恤其不足賓至如歸無寧菑患言見遇如此寧當復有灾患邪不畏冦盜而亦不患燥濕今銅鞮之宫數里銅鞮晉離宫而諸侯舍於𨽻人舍如𨽻人舍門不容車而不可踰越門庭之內迫迮又有牆垣之限盜賊公行而夭厲不戒厲猶灾也言水潦無時賓見無時命不可知若又勿壞是無所藏幣以重罪也敢請執事將何所命之問晉命已所止之宜雖君之有魯喪亦敝邑之憂也言鄭與魯亦有同姓之憂若獲薦幣修垣而行君之惠也敢憚勤勞文伯復命趙文子曰信我實不德而以𨽻人之垣以贏諸侯贏受也是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也襄三十一年子皮欲使尹何為邑為邑大夫子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽貫習也若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國傳言子産之治乃子皮之力齊侯使晏嬰請繼室於晉復以女繼少姜既成昏許昏成晏子受禮受賓享之禮叔向從之宴相與語叔向曰齊其何如晏子曰此季世也吾弗知齊其為陳氏矣公棄其民而歸於陳氏齊舊四量豆區釜鍾四升為豆各自其四以登於釜四豆為區容斗六升四區為釡釜容六斗四升登成也釜十則鍾六斛四斗陳氏三量皆登一焉鍾乃大矣登加也加一謂加舊量之一也以五升為豆五豆為區五區為釡則區三斗釡八斗鍾八斛以家量貸而以公量收之山木如市弗加於山魚鹽蜃蛤弗加於海賈如在山海不加貴疏曰如往也民參其力二入於公而衣食其一言公重賦斂公聚朽蠧而三老凍餒國之諸市屨賤踊貴踊刖足者屨言刖多民人痛疾而或燠休之燠休痛念之聲謂陳氏也其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲四人皆舜後陳氏之先其相胡公大姬已在齊矣胡公四人之後周始封陳之祖大姬其妃也言陳氏雖為人臣然將有國其先祖鬼神已與胡公共在齊叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行言晉衰弱不能征討救諸侯公乘無人卒列無長百人為卒言人皆非其人非其長庶民罷敝而宫室滋侈道殣相望而女富溢尤女嬖寵之家民聞公命如逃冦讐欒郤胥原狐續慶伯降在皂𨽻八姓晉舊臣之族也政在家門大夫專政民無所依君日不悛以樂慆憂慆藏也公室之卑其何日之有言今至讒鼎之銘曰昧旦丕顯後世猶怠昧旦早起也丕大也言夙興以務大顯後世猶懈怠况日不悛其能久乎晏子曰子將若何問何以免此難叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族唯羊舌氏在而已肸又無子無賢子公室無度無法度幸而得死言得以夀終為幸豈其獲祀初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者爽明塏燥辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅旅衆也公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之傳護晏子令不與張躍同譏傳譏張躍無隱諱同見本年景公於是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄已其是之謂乎及晏子如晉公更其宅反則成矣既拜拜謝其宅乃毁之而為里室皆如舊則使宅人反之還其故室且諺曰非宅是卜唯鄰是卜二三子先卜鄰矣二三子謂鄰人違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之昭公三年楚子狩于州萊狩冬獵也次于潁尾潁水之尾在下蔡西使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾溪在譙國城父縣南以為之援雨雪王皮冠秦復陶秦所遺羽衣也翠被以翠羽飾被豹舄以豹皮為履執鞭以出僕析父從右尹子革夕夕莫見王見之去冠被舍鞭敬大臣與之語曰昔我先王熊繹楚始封君與吕伋齊太公之子丁公王孫牟衛康叔子康伯燮父晉唐叔子禽父周公子伯禽並事康王四國皆有分我獨無有四國齊晉魯衛分珍寶之器今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山在新城沶鄉縣南篳路籃縷以處草莽跋涉山林以事天子唯是桃弧棘矢以共禦王事桃弧棘矢以禦不祥言楚在山林少所出有也齊王舅也成王母齊太公女晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將惟命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯逺我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也四國陳蔡二不羮又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚柲鏚斧也祕柄也破圭玉以飾斧柄也敢請命請制度之命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何譏其順王心子革曰摩厲以須王出吾刃將斬矣以已喻鋒刃欲自摩厲以斬王之淫慝王出復語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘對曰臣嘗問焉昔穆王欲肆其心周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心王是以獲沒於祇宫臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音愔愔安和貌思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心朱文公云家語貞觀政要形皆作刑蓋剖剝之意王揖而入饋不食寢不寐數日不能自克以及於難仲尼曰古也有志克已復禮仁也信善哉楚靈王若能如是豈其辱於乾溪昭十二年晉韓起聘于鄭宣子有環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請也子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求言所求少晉國亦未可以二晉國韓子不可偷也若屬有讒人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣不復成國若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎鋭細小也韓子買諸賈人既成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也復重求也今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周鄭本在周畿內桓公東遷并與商人俱來庸次比耦庸用也用次更相從耦耕以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無强賈無或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝藝法也鄭鄙邑也亦弗為也不欲為鄙邑事僑若獻玉不知所成敢私布之韓子辭玉曰起不敏敢求玉以徼二罪敢辭之鄭六卿餞宣子於郊宣子私覲於子産以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜昭十六年梗陽人有獄魏戊不能斷以獄上上魏子舒其大宗賂以女樂訟者之大宗魏子將受之魏戊謂閻沒女寬二子魏子之屬大夫曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭魏子朝君退而待於魏子之庭饋入召之召二大夫食比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食言飢甚饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎魏子中軍帥故謂之將軍及饋之畢願以小人之腹為君子之心屬厭而已屬足也言小人之腹飽猶知厭足君子之心亦宜然獻子辭梗陽人昭二十八年邾黑肱以濫來奔賤而書名重地故也黑肱非命卿故曰賤君子曰名之不可不慎也如是是黑肱也夫有所有名而不如其已有所謂有地也言雖有名不如無名已止也以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回回正心也不為義疚疚病也見義則為之或求名而不得或欲蓋而名章懲不義也齊豹為衛司寇守嗣大夫作而不義其書為盜求名而不得也二十年豹殺衛侯兄邾庶其莒牟夷邾黑肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也物事也肆放也齊豹書盜懲肆也三叛人名去貪也若艱難其身以險危大人而有名章徹攻難之士將奔走之攻猶作也奔走猶趨赴也若竊邑叛君以徼大利而無名貪冒之民將置力焉盡力為之不顧於見書是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也無禮惡逆皆數而不志記事之善者也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之昭三十一年國語晉文公既定襄王于郟王勞之以地辭請隧焉賈待中云隧王之葬禮闕地通路曰隧王弗許曰昔我先王之有天下也規方千里以為甸服規規畫而有之以供上帝山川百神之祀以其職貢供王祭也以備百姓兆民之用以待不庭不虞之患其餘以均分公侯伯子男其餘向服之外地也使各有寧宇以順及天地無逢其災害順天地尊卑之義也若相侵犯則有災害先王豈有賴焉賴利也言無所利皆均分諸侯內官不過九御九御九嬪外官不過九品九品九卿足以供給神祇而已言嬪與卿主祭祀也豈敢猒縱其耳目心腹以亂百度亦唯是死生之服物采章以臨長百姓而輕重布之王何異之有輕重布之貴賤各有等也今天降禍災於周室豫一人僅亦守府僅猶劣也府先王之府藏又不佞以勤叔父而班先王之大物以賞私德班分也大物謂隧也其叔父實應且憎以非豫一人豫一人豈敢有愛也應猶受憎惡也言晉文雖當私賞猶非我一人先民有言曰改玉改行玉佩玉所以節行步也君臣尊卑遲速有節言服其服則行其禮以言晉侯尚在臣位不宜有隧也叔父若能光裕大德更姓改物以創制天下自顯庸也改物改正朔易服色也而縮取備物以鎮撫百姓縮引也備物隧之屬豫一人其流辟於裔土何辭之與有流放也言將放辟於荒裔復何陳辭之有乎若由是姬姓也謂文公未更姓而王尚將列為公侯以復先王之職大物其未可改也叔父其茂昭明德物將自至言有天下則隧自至豫敢以私勞變前之大章以忝天下章表也所以表明天子與諸侯異物其若先王與百姓何言無以奉先王鎮撫百姓何政令之為也何以復臨百姓而為政令乎若不然叔父有地而隧焉自制地為隧也豫安能知之所不敢禁文公遂不敢請受地而還西山曰愚按此篇要領在班先王之大物以賞私德一語後云余敢以私勞變前之大章蓋覆說此意也晉文公之於定襄王自以為不世之大功其請隧也蓋駸駸乎窺大物之漸襄王目之曰私德曰私勞所以折其驕矜不遜之意玩其辭氣若優游而實峻烈真可為告諭諸侯之法公父文伯退朝朝其母其母方績文伯曰以歜之家而主猶績言家有寵不當績也懼干季孫之怒也季孫康子也其以歜為不能事主乎其母歎曰魯其亡乎使僮子備官而未之聞邪居吾語女居坐昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也是故天子大采朝日與三公九卿祖識地德大采衮織也祖習也識知也日中考政與百官之政事師尹維旅牧相宣序民事宣偏也序次也少采夕月與太史司載糾䖍天刑糾共也䖍敬也日入監九御使潔奉禘郊之粢盛而後即安即就也諸侯朝修天子之業命業事也晝考其國職夕省其典刑夜警百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安庀治也士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠王后親織𤣥紞公侯之夫人加之紘綖說云紞冠之埀前後者昭謂紞所以縣瑱當耳者卿之內子為大帶卿之適妻曰內子大帶緇帶也命婦成祭服命婦大夫之妻列士之妻加之以朝服列士元士也既成祭服又加之以朝服也自庶士以下皆衣其夫庶士下士也下至庶人也社而賦事蒸而獻功社春分祭社也事農桑之屬也冬祭曰蒸蒸而獻五榖布帛之功也男女效績愆則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以避辟吾冀而朝夕修我曰必無廢先人爾今曰胡不自安欲使我不績而自安以是承先君之官余懼穆伯之絶祀也仲尼聞之曰弟子志之季氏之婦不淫矣叔向見韓宣子宣子憂貧叔向賀之宣子曰吾有卿之名而無其實無以從二三子吾是以憂子賀我何故對曰昔欒武子無一卒之田上大夫一卒之田其官不備其宗器宗宗官器祭器宣其德行順其憲則使越于諸侯越發聞也諸侯親之戎狄懷之以正晉國行刑不疚疚病也以免於難免弒君之難及桓子驕汰奢侈貪欲無藝桓子欒書之子黶也略則行志則法假貸居賄宜及於難而賴武之德以沒其身及懷子改桓之行而修武之德懷子桓子之子盈也可以免於難而離桓之罪以亡于楚亡奔也夫郤昭子昭子郤至也其富半公室其家半三軍恃其富寵以泰于國其身尸於朝其宗滅于絳不然八郤五大夫三卿三卿郤錡郤至郤犨又有五人為大夫其寵大矣一朝而滅莫之哀也唯無德也今吾子有欒武子之貧吾以為能其德矣是以賀若不憂德之不建而患貨之不足將弔不暇何賀之有宣子拜稽首焉曰起也將亡賴子存之非起也敢專承之其自桓叔以下嘉吾子之賜桓叔韓氏之祖曲沃桓叔也合求玉憂貧二事觀之宣子蓋多欲矣居則賴叔向以存其亡出則因子産以兔其憂而韓子卒稱君子且令終焉人其可無法家拂士乎哉趙簡子使尹鐸為晉陽曰必墮其壘培墮壞也壘荀寅士吉射圍趙氏所作壁壘也吾將往焉若見壘培是見寅與吉射也尹鐸往而增之簡子如晉陽見壘怒曰必殺鐸也而後入大夫辭之辭請也不可曰是昭豫讐也郵無正進無正晉大夫郵良伯樂曰昔先主文子少釁於難文子簡子祖趙武也釁猶離也難謂莊姬之讒趙氏見討從姬氏於公宫姬氏莊姬趙朔之妻文子之母晉景公之姊也有孝德以出在公族為公族大夫有恭德以升在位有武德以羞為正卿有溫德以成其名譽失趙氏之典刑而去其師保在公宫故無師保也基於其身以克復其所及景子長於公宫景子文子之子簡子之父趙成也從其王母在公宫未及教訓而嗣立矣亦能纂修其身以受先業無謗於國順德以學子學教也擇言以教子擇師保以相子今吾子嗣位有文之典刑有景之教訓重之以師保加之以父兄同宗之父兄子皆疏之以及此難荀士之難夫尹鐸曰思樂而喜思難而懼人之道也委土可以為師保吾何為不增言見壘培可以戒懼足當師保何為不增是以修之庶曰可以鑑而鳩趙宗乎鳩安也若罰之是罰善也罰善必賞惡臣何望矣簡子說曰微子吾幾不為人矣以免難之賞賞尹鐸免難之賞軍賞也言見戒而懼懼則有備是為免難也左史倚相廷見申公子亹子亹楚申公史老也子亹不出左史謗之舉伯以告舉伯是大夫也子亹怒而出曰子無亦謂我老耄而舍我而又謗我左史曰唯子老耄故欲見以交警子若子方壯能經營百事倚相將奔走承序承受事業次序於是不給而何暇得見昔衛武公年數九十有五矣猶針警於國曰自卿以下至于師長士師長大夫士衆士也苟在朝者無謂我老耄而舍我舍棄也八十曰耄必恭恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我言謗譽之言志記也在輿有旅賁之規位寧有宫師之典倚几有誦訓之諌誦訓工師所誦之諫書之於几居寢有􅉏御之針臨事有瞽史之道事戎祀也瞽樂太師掌詔吉凶史太史也掌詔禮事冥居有師工之誦師樂師工瞽矇也誦謂針諫也史不失書矇不失誦以訓御之御進也於是乎作懿戒以自警也懿詩大雅抑之篇也懿讀曰抑及其沒也謂之睿聖武公子實不睿聖於倚相何害周書曰文王至于日中昃不皇暇食惠于小民維政之恭文王猶不敢惰今子老楚國而欲自安也老老恃是國也以禦數者王將何為禦止也數者謂針戒誹謗也為人臣尚如此王將復何為若常如此楚其難哉子亹懼曰老之過也老子亹名乃驟見左史鬬且廷見令尹子常鬬且楚大夫子常子囊之孫囊瓦也子常與之語問蓄貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹令尹問蓄聚積實如餓豺狼焉殆必亡者也夫古者聚貨不妨民衣食之利聚馬不害民之財用貨珠玉之屬自然物也國馬足以行軍國馬名馬也公馬足以稱賦公馬公之戎馬也稱舉也賦兵賦也不是過也公貨足以賓獻賓饗贈獻貢也家貨足以共用家大夫也不是過也夫貨馬郵則闕於民郵過也闕缺也民多闕則有離畔之心將何以封矣封封國也昔鬬子文三舍令尹子文鬬伯比之子於菟也舍去也無一日之積恤民故也成王聞子文之朝不及夕也於是乎每朝設脯一束糗一筐以羞子文糗寒粥也筐器名也羞進也至于今令尹秩之秩常也成王每出子文之祿必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取富焉曠空也是勤民以自封也死無日矣我逃死非逃富也故莊王之世滅若敖氏唯子文之後在至于今處鄖為楚良臣是不先恤民而後已之富乎今子常先大夫之後也先大夫子囊也而相楚君無令名於四方民之羸餒日日已甚四境盈壘言壘壁滿於四境之內道殣相望盜賊伺目民無所放放依也是之不恤而蓄聚不厭其速怨於民多矣速召也積貨滋多蓄怨滋厚不亡何待夫民心之愠也若防大川焉潰而所犯必大矣子常其能賢於成靈乎成不禮於穆願食熊蹯不獲而死靈王不顧於民一國弃之如遺迹焉子常為政而無禮不顧甚於成靈其獨何力以待之待猶禦也期年乃有柏舉之戰子常奔鄭昭王奔隨吳王夫差起師伐越越王勾踐起師逆之江大夫種乃獻謀曰夫吳之與越唯天所授王其無庸戰夫申胥華登簡服吳國之士於甲兵而未嘗有所挫也夫一人善射百夫決拾決鈎弦也拾捍也言申胥華登善用兵衆必化之勝未可成成猶必也夫謀必素見成事焉而後履之不可以授命授命猶鬬命也王不如設戎約辭行成設兵自備約其辭以求平以喜其民以廣侈吳王之心吾以卜之於天天若棄吳必許吾成而不吾足也言越不足畏將必寬然有伯諸侯之心焉既罷弊其民而天奪之食安受其燼乃無有命矣吳無復有天命矣越王許諾乃命諸稽郢行成於吳曰寡君勾踐使下臣郢不敢顯然布幣行禮敢私告於下執事曰昔者越國見禍得罪於天王見禍於天得罪謂傷闔廬也言天王尊之以名天王親趨玉趾以心孤勾踐孤弃也而又宥赦之君王之於越也繄起死人而肉白骨也繄是也孤不敢忘天災其敢忘君王之大賜乎今勾踐申禍無良申重也良善也草鄙之人敢忘天王之大德而思邊垂之小怨以重得罪於下執事勾踐用帥二三之老親委重罪頓䫙於邊今君王不察盛怒屬兵將殘伐越國越國固貢獻之邑也君王不以鞭箠使之而辱軍士使冦令焉若禦冦之號令勾踐請盟一介嫡女執箕帚以䀭姓於王宫一介一人晐備姓庶姓也曲禮曰納女於天子曰備百姓一介嫡男奉槃匜以隨諸御御近臣宦豎之屬春秋貢獻不解於王府天王豈辱裁之亦征諸侯之禮也征稅也此亦天子征稅諸侯之禮夫諺曰狐埋之而狐搰之是以無成功搰發也今天王既封殖越國以明聞於天下言天下備聞而又刈亡之是天王之無成勞也雖四方之諸侯則何實以事吳敢使下臣盡辭唯天王秉利度義焉吳王夫差乃告諸大夫曰孤將有大志於齊吾將許越成而無拂吾慮若越既改吾又何求若其不改反行吾振旅焉伐齊反振旅而討之申胥諫曰不可許也夫越非實忠心好吳也又非懾畏吾甲兵之强也大夫種勇而善謀將還玩吾國於股掌之上以得其志還轉也夫固知君王之蓋威以好勝也蓋猶尚也故婉約其辭以從逸王志使淫樂於諸夏之國以自傷也使吾甲兵頓弊民人離落而日以憔悴然後安受吾燼夫越王好信以愛民四方歸之年榖時熟日長炎炎及吾猶可以戰也為虺弗摧為蛇將若何虺小蛇大吳王曰大夫奚隆於越隆盛也越曽足以為大虞乎若無越則吾何以春秋曜吾軍士乃許之成將盟越王又使諸稽郢辭曰以盟為有益乎前盟口血未乾足以結信矣以盟為無益乎君王舍甲兵之威以臨使之而胡重於鬼神而自輕也吳王乃許之荒成不盟荒空也孫子孫子曰凡先處戰地而待敵者佚後處戰地而趨敵者勞故善戰者致人而不致於人能使敵人自至者利之也能使敵人不得至者害之也故敵佚能勞之飽能饑之安能動之出其所不趨趨其所不意行千里而不勞者行於無人之地也攻而必取者攻其所不守也守而必固者守其所不攻也故善攻者敵不知其所守善守者敵不知其所攻微乎微乎至於無形神乎神乎至於無聲故能為敵之司命進而不可禦者衝其虛也退而不可追者速而不可及也故我欲戰敵雖髙壘深溝不得不與我戰者攻其所必救也我不欲戰雖畫地而守之敵不得與我戰者乖其所之也故形人而我無形則我專而敵分我專為一敵分為十是以十攻其一也則我衆敵寡能以衆擊寡則吾之所與戰者約矣吾所與戰之地不可知不可知則敵所備者多敵所備者多則吾所與戰者寡矣故備前則後寡備後則前寡備左則右寡備右則左寡無所不備則無所不寡寡者備人者也衆者使人備已者也故知戰之地知戰之日則可千里而㑹戰不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而况逺者數十里近者數里乎以吾度之越人之兵雖多亦奚益於勝哉故曰勝可為也敵雖衆可使無鬬故䇿之而知得失之計作之而知動靜之理形之而知死生之地角之而知有餘不足之處故形兵之極至於無形無形則深間不能窺智者不能謀因形而措勝於衆衆不能知人皆知我所以勝之形而莫知吾所以制勝之形故其戰勝不復而應形於無窮夫兵形象水水之形避髙而趨下兵之形避實而擊虛水因地而制流兵因敵而制勝故兵無常勢水無常形能因敵變化而取勝者謂之神故五行無常勝四時無常位日有短長月有死生列子子列子曰天地無全功聖人無全能萬物無全用故天職生覆地職形載聖職教化物職所宜然則天有所短地有所長聖有所否物有所通何則生覆者不能形載形載者不能教化教化者不能違所宜宜定者不出所位故天地之道非隂則陽聖人之教非仁則義萬物之宜非柔則剛此皆隨所宜而不能出所位者也故有生者有生生者有形者有形形者有聲者有聲聲者有色者有色色者有味者有味味者生之所生者死矣而生生者未嘗終形之所形者實矣而形形者未嘗有聲之所聲者聞矣而聲聲者未嘗發色之所色者彰矣而色色者未嘗顯味之所味者嘗矣而味味者未嘗呈皆無為之職也能隂能陽能柔能剛能短能長能圓能方能生能死能暑能凉能浮能沈能宫能商能出能沒能𤣥能黃能甘能苦能羶能香無知也無能也而無不知也而無不能也造父之師曰泰豆氏造父之始從習御也執禮甚卑泰豆三年不告造父執禮愈謹乃告之曰古詩言良弓之子必先為箕良冶之子必先為裘女先觀吾趣趣如吾然後六轡可持六馬可御造父曰唯命所從泰豆乃立木為塗僅可容足計步而置履之而行趣走往還無跌失也造父學之三日盡其巧泰豆歎曰子何其敏也得之捷乎凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎轡銜之際而急緩乎脣吻之和正度乎胸臆之中而執節乎掌握之間內得於中心而外合於馬志是故能進退履繩墨而旋曲中規矩取道致逺而氣力有餘誠得其術也得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以䇿驅心間體正六轡不亂而二十四蹄所投無差回旋進退莫不中節然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之險原隰之夷視之一也吾術窮矣汝其識之北宫子謂西門子曰朕與子並世也而人子達並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則裋褐食則粢糲居則蓬室出則徒行子衣則文錦食則粱肉居則連欐出則結駟在家熙然有弃朕之心在朝諤然有敖朕之色請謁不相及遨遊不同行固有年矣子自以德過朕耶西門子曰豫無以知其實汝造事而窮豫造事而達此厚薄之驗歟謂德有厚薄也而皆謂與豫並汝之顔厚矣北宫子無以應自失而歸中途遇東郭先生先生曰汝奚往而反偊偊而步有深愧之色耶北宫子言其狀東郭先生曰吾將舍汝之愧與汝更之西門氏而問之曰汝奚辱北宫子之深乎固且言之西門子曰北宫子言世族年貌言行與豫並而貴賤貧富與豫異豫語之曰豫無以知其實汝造事而窮豫造事而達此將厚薄之驗歟而皆謂與豫並汝之顔厚矣東郭先生曰汝之言厚薄不過言才德之差吾之言厚薄異於是矣夫北宫子厚於德薄於命汝厚於命薄於德汝之達非智得也北宫子之窮非愚失也皆天也非人也而汝以命厚自矜北宫子以德厚自愧皆不識夫固然之理矣西門子曰先生止矣豫不敢復言北宫子既歸衣其裋褐有狐貉之溫進其茙菽有稻粱之味庇其蓬室有廣厦之䕃乘其蓽輅有文軒之飾終身逌然不知榮辱之在彼也在我也東郭先生聞之曰北宫子之寐久矣一言而能寤易悟也哉莊子庖丁為文惠君解牛手之所解肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之㑹經首樂章名文惠君曰嘻善哉技蓋至此乎庖丁釋刀對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未嘗見全牛也但見其理間也方今之時臣以神遇而不以目視暗與理㑹官知止而神欲行司察之官廢縱心而順理依乎天理不橫截也批大郤有際之處因而批之令離導大窽節解窽空就導令殊因其固然技經肯綮之未嘗游刃於空未嘗經於微礙也肯著骨內也綮結處也而况大軱乎軱戾大骨衄刀刃也良庖嵗更刀割也族庖月更刀折也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎硎砥石也彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族交錯聚結為族吾見其難為怵然為戒視為止行為遲徐其手也動刀甚微謋然已解如土委地提刀而立為之四顧為之躊躇滿志善刀而藏之文惠君曰善哉吾聞庖丁之言得養生焉天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海內服明於天通於聖六通四辟於帝王之德者其自為也昧然無不靜者矣聖人之靜也非曰靜也善故靜也萬物無足以撓心者故靜也水靜則明燭鬚眉平中准大匠取法焉水靜猶明而况精神聖人之心靜乎天地之鑒也萬物之鏡也夫虛靜恬淡寂寞無為者天地之平而道德之至故帝王聖人休焉休則虛虛則實實者倫矣虛則靜靜則動動則得矣靜則無為無為也則任事者責矣無為則俞俞俞俞者憂患不能處年壽長矣夫虛靜恬淡寂寞無為者萬物之本也明此以南鄉堯之為君也明此以北面舜之為臣也以此處上帝王天子之德也以此處下𤣥聖素王之道也以此退居而間游江海山林之士服以此進為而撫世則功大名顯而天下一也靜而聖動而王無為也而尊朴素而天下莫能與之爭美夫明白於天地之德者此之謂大本大宗與天和者也所以均調天下與人和者也與人和者謂之人樂與天和者謂之天樂莊子曰吾師乎吾師乎虀萬物而不為戾澤及萬世而不為仁長於上古而不為壽覆載天地刻雕衆形而不為巧此之謂天樂故曰知天樂者其生也天行其死也物化靜而與隂同德動而與陽同波故知天樂者無天怨無人非無物纍無鬼責故曰其動也天其靜也地一心定而王天下其鬼不祟其魂不疲一心定而萬物服言以虛靜推於天地通於萬物此之謂天樂天樂者聖人之心以畜天下也夫帝王之德以天地為宗以道德為主以無為為常無為也則用天下而有餘有為也則為天下用而不足故古之人貴夫無為也上無為也下亦無為也是下與上同德下與上同德則不臣下有為也上亦有為也是上與下同道上與下同道則不主上必無為而用天下下必有為為天下用此不易之道也故古之王天下者智雖落天地不自慮也辨雖雕萬物不自說也能雖窮海內不自為也天不産而萬物化地不長而萬物育帝王無為而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳治之末也鐘鼓之音羽旄之容樂之末也哭泣衰絰隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也末學者古人有之而非所以先也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也夫天地至神而有尊卑先後之序而况人道乎宗廟尚親朝廷尚尊鄉黨尚齒行事尚賢大道之序也語道而非其序者非其道也語道而非其道者安取道是故古之明大道者先明天而道德次之道德已明而仁義次之仁義已明而分守次之分守已明而形名次之形名已明而因任次之因任已明而原省次之原省已明而是非次之是非已明而賞罰次之賞罰已明而愚知處宜貴賤履位仁賢不肖襲情必分其能必由其名以此事上以此畜下以此治物以此修身知謀不用必歸其天此之謂太平治之至也故書曰有形有名形名者古人有之而非所以先也古之語大道者五變而形名可舉九變而賞罰可言也驟而語形名不知其本也驟而語賞罰不知其始也倒道而言忤道而說者人之所治也安能治人驟而語刑名賞罰此有知治之具非知治之道可用於天下不足以用天下此之謂辨士一曲之人也禮法數度形名比詳古人有之此下之所以事上非上之所以畜下也昔者舜問於堯曰天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人此吾所以用心也舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧日月照而四時行若晝夜之有經雲行而雨施矣堯曰然則膠膠擾擾乎自嫌有事子天之合也我人之合也夫天地者古之所大也而黃帝堯舜之所共美也故古之王天下者奚為哉天地而已矣世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也為其貴非其貴也故視而可見者形與色也聰而可聞者名與聲也悲夫世人以形色名聲為足以得彼之情夫形色名聲果不足以得彼之情則知者不言言者不知而世豈識之哉桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而上問桓公曰敢問公之所讀為何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟魄己夫桓公曰寡人讀書輪人安得議乎有說則可無說則死輪扁曰臣也以臣之事觀之斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古之人與其不可傳也死矣然則君之所讀者古人之糟魄已夫孔子見老聃老聃新沐方將被髮而乾慹然似非人寂漠之至孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也老聃曰吾遊於物之初孔子曰何謂邪曰心困焉而不能知口辟焉而不能言嘗謂汝議乎其將至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉或為之紀而莫見其形消息滿虛一晦一明日改月化日有所為而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知乎其所窮非是也且孰為之宗孔子曰請問遊是老聃曰夫得是至美至樂也得至美而遊乎至樂謂之至人孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易水行小變而不失其大常也喜怒哀樂不入於胸次夫天下也者萬物之所一也得其所一而同焉則四支百體將為塵垢而死生終始將為晝夜而莫之能滑而况得喪禍福之所介乎弃𨽻者若弃泥塗知身貴於𨽻也貴在於我而不失於變且萬化而未始有極也夫孰足以患心已為道者解乎此孔子曰夫子德配天地而猶假至言以修心古之君子孰能脫焉老聃曰不然夫水之於汋也無為而才自然矣至人之於德也不修而物不能離焉若天之自髙地之自厚日月之自明夫何修焉孔子出以告顔回曰丘之於道也其猶醯雞與微夫子之發吾覆也吾不知天地之大全也天下之治方術者多矣皆以其有為不可加矣古之所謂道術者果惡乎在曰無乎不在曰神何由降明何由出聖有所生王有所成皆原於一不離於宗謂之天人不離於精謂之神人不離於真謂之至人以天為宗以德為本以道為門兆於變化謂之聖人以仁為恩以義為理以禮為行以樂為和薰然慈仁謂之君子以法為分以名為表以參為驗以稽為決其數一二三四是也百官以此相齒以事相常以衣食為主蕃息蓄藏老弱孤寡為意皆有以養民之理也古之人其備乎配神明醇天地育萬物和天下澤及百姓明於本數係於末度六通四辟小大精粗其運無乎不在其明而在厯數度者舊法世傳之史尚多有之其在於詩書禮樂者鄒魯之士縉紳先生多能明之詩以道忠書以道事禮以道行樂以道和易以道隂陽春秋以道名分其數散於天下而設於中國者百家之學時或稱而道之天下大亂賢聖不明道德不一天下多得一察焉以自好譬如耳目鼻口皆有所明不能相通猶百家衆技也皆有所長時有所用雖然不該不遍一曲之士也判天地之美析萬物之理察古人之全寡能備於天地之美稱神明之容是故內聖外王之道暗而不明鬱而不發天下之人各為其所欲焉以自為方悲夫百家往而不返必不合矣後世之學者不幸不見天地之純古人之大體道術將為天下裂荀子聖人也者道之管也天下之道管是矣百王之道一是矣故詩書禮樂之歸是矣詩言是其志也書言是其事也禮言是其行也樂言是其和也春秋言是其微也故風之所以為不逐者取是以節之也小雅之所以為小雅者取是以文之也大雅之所以為大雅者取是以光之也頌之所以為至者取是以通之也天下之道畢矣人之城守人之出戰而我以力勝之也則傷人之民必甚矣傷人之民甚則人之民惡我必甚矣人之民惡我甚則日欲與我鬬人之城守人之出戰而我以力勝之則傷吾民必甚矣傷吾民甚則吾民之惡我必甚矣吾民之惡我甚則日不欲為我鬬人之民日欲與我鬬吾民日不欲為我鬬是强者之所以反弱也地來而民去纍多而功少雖守者益所以守者損是以大者之所以反削也諸侯莫不懷交接怨而不忘其敵伺强大之間承强大之弊此强大之殆時也大饗尚𤣥尊爼生魚先大羮貴食飲之本也饗尚𤣥尊而用酒醴先黍稷而飯稻粱祭齊太羮齊讀為嚌至齒也而飽庶羞貴本而親用也貴本之謂文親用之謂理兩者合而成文以歸大一夫是之謂大隆故尊之尚𤣥酒也俎之尚生魚也豆之先大羮也一也利爵之不醮也醮盡也祭告利成其爵不卒成事之俎不嘗也成事謂尸既飽禮成不嘗其爼三臭之不食也臭謂歆其氣皆謂禮畢無文飾復歸于朴一也大昏之未發齊也齊戒以告鬼神大廟之未入尸也始卒之未小斂也一也大路之素未集也郊之麻絻也喪服之先散麻也一也禮者謹於治生死者也生人之始也死人之終也終始俱善人道畢矣故君子敬始而慎終終始如一是君子之道禮義之文也夫厚其生而薄其死是敬其有知而慢其無知也是姦人之道而倍叛之心也君子以倍叛之心接臧榖猶且羞之而况以事其所隆親乎故死之為道也一而不可得再復也臣之所以致重其君子之所以致重其親於是盡矣禮者謹於吉凶不相厭者也紸纊聽息之時則夫忠臣孝子亦知其閔已然而殯斂之具未有求也垂涕恐懼然而幸生之心未已持生之事未輟也卒矣然後作具之故雖備家必踰日然後殯三日而成服然後告逺者出矣備物者作矣故殯久不過七十日速不損五十日是何也曰逺者可以至矣百求可以得矣百事可以成矣其忠至矣其節大矣其文備矣然後月朝卜日月夕卜宅然後葬也當是時也其義止誰得行之其義行誰得止之故三月之葬其貌以生設飾死者也貌象也象生之所設器用飾死者三月乃能備之也殆非直留死者以安生也是致隆思慕之義也喪禮之凡變而飾動而逺久而平故死之為道也不飾則惡惡則不哀爾則玩玩則厭厭則忘忘則不敬一朝而喪其嚴親而所以送葬之者不哀不敬則嫌於禽獸矣君子恥之故變而飾所以滅惡也動而逺所以遂敬也久而平所以優生也禮者斷長續短損有餘益不足達愛敬之文而滋成行義之美者也君之喪所以取三年何也君者治辨之主也文理之原也情貌之盡也相率而致隆之不亦可乎詩云愷悌君子民之父母彼君者因有為民父母之說焉父能生之不能養之母能食之不能教誨之君者已能食之又善教誨之者也三年畢矣哉乳母飲食之者也而三月慈母衣被之者也而九月君曲被之者也三年畢乎哉得之則治失之則亂文之至也得之則安失之則危情之至也兩至者俱積焉以三年事之猶未足也直無由進之耳妙絶古今卷一
