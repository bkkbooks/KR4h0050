body:
  text: 妙絶古今總集類提要臣等謹案妙絶古今四卷舊無編輯者名氏前有嘉靖乙卯南贑巡撫談愷刋書序後有南安知府王廷幹跋但稱為宋人所選而不得其本末宋史藝文志亦無此書之名今以元趙汸東山存稿考之蓋湯漢所編也漢有東澗遺集已别著録是編甄輯古文起春秋左氏傳説眉山蘇氏凡二十一家七十九篇卷首原序有稱東澗書者即漢之自題其稱紫霞老人者則趙汝騰所題趙汸謂曽見鄱陽馬公文有妙絶古今序後於書肆見是書卷首不載馬公之序今此本亦無之而馬廷鸞碧梧玩芳集世已失傳惟永樂大典間存一二亦無此序則其佚久矣書中所録代不數人人不數首似不足概古今作者故趙汸稱觀馬公詞意若無取焉者獨汸以宋代衰微之故與漢出處大概推闡其旨以為南渡忍恥事讐理宗容姦亂政故取左氏國䇿所載之事以昭諷勸而并及於漢唐二代興亡之由又取屈原樂毅韓愈送孟東野序歐陽修蘇子美集序諸篇有感于士之不遇而復進之于道以庶幾乎知所自反其去取之間篇篇具有深義因作為題後以發明之凡一千四百餘言而漢著書之意始明乃知以闕略議之者由未論乎其世矣書中間有評注當亦出漢原本今並録存之自序稱壬寅乃理宗淳祐元年蓋猶其未仕時所撰定云乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀妙絶古今序文章之精絶者一代不數人而一人不數篇余自春秋傳訖歐蘇氏拔其尤得七十有九首蓋千載之英華萃矣時同子弟朋友吟諷之善哉今而後有過豫陋巷而聞軒縣者必是編也夫淳祐壬寅春東澗書伯紀負竒材遊諸公間袐監柴公敬其行西山真公取其學南塘趙公竒其文昔余為江東憲公餘屈致館舍論辨終日因得是編皆諸老之緒言也銖兩之必較毫髮之不差軼梁統之選而過之精矣雖然言之精者道之寄六經其元氣也學者又當亹亹母但求言語句讀之工而已寶祐丁巳三月紫霞老人題妙絶古今序文以載道也孔子曰文不在茲乎言道也周末文勝於是有離道而為文者秦以上書漢以對䇿唐以詩賦取士於是學者以文為進取計而離道益逺矣梁蕭統文選唐姚鉉文粹自謂時更七代理貫六籍略蕪集英掇菁擷華後有作者不可為已由今觀之其皆載道之文乎抑否乎考之聖門遊夏以文學名而列之四科之末故子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也豈遊夏從於陳蔡之間性與天道尚未得聞之與要之文而離道藝焉而已桞桞州言少為文章以辭為工及長乃知文以明道是故抑之欲其奧揚之欲其明踈之無其通應之欲其節激而發之欲其清固而存之欲其重此吾所以羽翼夫道也本之易詩書禮春秋以取道之原參之孟荀莊老榖梁國語離騷太史旁推交通而以之為文其文似矣其果合於道乎後之論桞州者謂其於道何如也余昔以文舉于有司蓋學而未能者厯仕三十年尚未聞道竊見今之名家如后渠荆川嘗選擇古人之文以嘉惠學者是編蓋宋人所選真西山亦稱許之其曰妙絶以文言抑以道言也無乃資新進末學以為干名應試之階乎虔之蕭蘭氏得善本授之梓焉請豫序之其載道與否當有具眼於驪黃牝牡之外者嘉靖乙邜春正月既望賜進士出身通議大夫都察院右副都御史奉敕巡撫南贛汀漳等處地方提督軍務錫山談愷書
